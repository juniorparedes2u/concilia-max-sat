<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->

    <!-- JSZip -->

    <!-- SheetJS -->

    <!-- Firebase SDK (Modular via compat for single-file integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=400;500;700&family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');

</head>
<body class="text-slate-900 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONSTANTES Y DATOS POR DEFECTO ---
        const PROVIDER_MODELS = {
            google: [
                { value: 'gemini-2.5-flash', label: 'gemini-2.5-flash (Balance óptimo)' },
                { value: 'gemini-2.5-pro', label: 'gemini-2.5-pro (Auditorías de alta precisión)' },
                { value: 'gemini-1.5-flash', label: 'gemini-1.5-flash (Velocidad)' }
            ],
            anthropic: [
                { value: 'claude-3-5-sonnet-latest', label: 'claude-3-5-sonnet-latest (Precisión)' },
                { value: 'claude-3-5-haiku-latest', label: 'claude-3-5-haiku-latest (Económico)' }
            ],
            openai: [
                { value: 'gpt-4o', label: 'gpt-4o (Insignia)' },
                { value: 'gpt-4o-mini', label: 'gpt-4o-mini (Rápido)' },
                { value: 'o1-mini', label: 'o1-mini (Razonamiento)' }
            ],
            openrouter: [
                { value: 'google/gemini-2.5-flash', label: 'OR: Google Gemini 2.5 Flash' },
                { value: 'anthropic/claude-3.5-sonnet', label: 'OR: Anthropic Claude 3.5 Sonnet' }
            ]
        };

        const DEFAULT_ACCOUNTS = [
            { codigo: '102-01-001', nombre: 'Bancos Nacionales - BBVA', tipo: 'Activo' },
            { codigo: '105-01-001', nombre: 'Clientes Nacionales', tipo: 'Activo' },
            { codigo: '118-01-001', nombre: 'IVA Acreditable Pagado', tipo: 'Activo' },
            { codigo: '201-01-001', nombre: 'Proveedores', tipo: 'Pasivo' },
            { codigo: '213-01-001', nombre: 'IVA Trasladado Cobrado', tipo: 'Pasivo' },
            { codigo: '401-01-001', nombre: 'Ingresos por Servicios', tipo: 'Ingreso' },
            { codigo: '601-01-001', nombre: 'Gastos de Oficina y Papelería', tipo: 'Egreso' },
            { codigo: '601-01-002', nombre: 'Gastos de Mantenimiento General', tipo: 'Egreso' },
            { codigo: '601-01-003', nombre: 'Licenciamiento de Software', tipo: 'Egreso' },
            { codigo: '601-01-004', nombre: 'Servicios de Internet y Telecom', tipo: 'Egreso' }
        ];

        // --- FUNCIONES AUXILIARES ---
        const safeParseJSON = (text) => {
            if (!text) return null;
            let clean = text.trim();
            if (clean.startsWith('```json')) clean = clean.substring(7);
            else if (clean.startsWith('```')) clean = clean.substring(3);
            if (clean.endsWith('```')) clean = clean.substring(0, clean.length - 3);
            try { return JSON.parse(clean.trim()); } catch (e) { return null; }
        };

        const getElementByLocalName = (parent, localName) => {
            if (!parent) return null;
            const tags = parent.getElementsByTagName('*');
            for (let i = 0; i < tags.length; i++) {
                const nodeLocalName = tags[i].localName || tags[i].tagName.split(':').pop();
                if (nodeLocalName && nodeLocalName.toLowerCase() === localName.toLowerCase()) return tags[i];
            }
            return null;
        };

        const getAttrIgnoreCase = (element, attrName) => {
            if (!element) return null;
            let val = element.getAttribute(attrName);
            if (val !== null) return val;
            for (let i = 0; i < element.attributes.length; i++) {
                const cleanName = element.attributes[i].name.split(':').pop().toLowerCase();
                if (cleanName === attrName.toLowerCase()) return element.attributes[i].value;
            }
            return null;
        };

        const parseSingleXmlText = (xmlText, fileName, currentRfc) => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            if (xmlDoc.getElementsByTagName("parsererror").length > 0) throw new Error("XML ilegible");

            const comp = getElementByLocalName(xmlDoc, "Comprobante");
            const emisor = getElementByLocalName(xmlDoc, "Emisor");
            const receptor = getElementByLocalName(xmlDoc, "Receptor");
            const timbre = getElementByLocalName(xmlDoc, "TimbreFiscalDigital");
            
            if (!comp) throw new Error("No CFDI");

            const uuid = timbre ? getAttrIgnoreCase(timbre, "UUID") : `LOC-${Math.random().toString(36).substr(2,9)}`;
            const rfcEmisor = (getAttrIgnoreCase(emisor, "Rfc") || "X").toUpperCase();
            const rfcReceptor = (getAttrIgnoreCase(receptor, "Rfc") || "X").toUpperCase();
            
            let tipo = "Recibido";
            const tipoComp = getAttrIgnoreCase(comp, "TipoDeComprobante") || "I";
            if (tipoComp.toUpperCase() === 'N' || getElementByLocalName(xmlDoc, "Nomina")) tipo = "Nómina";
            else if (tipoComp.toUpperCase() === 'P' || getElementByLocalName(xmlDoc, "Pagos")) tipo = "Pago";
            else if (rfcEmisor === currentRfc) tipo = "Emitido";

            const conceptos = Array.from(xmlDoc.getElementsByTagName('*')).filter(t => (t.localName || t.tagName.split(':').pop()).toLowerCase() === 'concepto');
            const conceptoStr = conceptos.map(c => getAttrIgnoreCase(c, "Descripcion")).filter(Boolean).join(", ");

            return {
                uuid,
                fecha: getAttrIgnoreCase(comp, "Fecha")?.substring(0, 10) || new Date().toISOString().substring(0, 10),
                rfcEmisor, nombreEmisor: getAttrIgnoreCase(emisor, "Nombre") || "Proveedor",
                rfcReceptor, nombreReceptor: getAttrIgnoreCase(receptor, "Nombre") || "Cliente",
                total: parseFloat(getAttrIgnoreCase(comp, "Total") || 0),
                subtotal: parseFloat(getAttrIgnoreCase(comp, "SubTotal") || 0),
                iva: parseFloat(getAttrIgnoreCase(comp, "Total") || 0) - parseFloat(getAttrIgnoreCase(comp, "SubTotal") || 0),
                tipo,
                concepto: conceptoStr,
                metodoPago: getAttrIgnoreCase(comp, "MetodoPago") || "PUE",
                formaPago: getAttrIgnoreCase(comp, "FormaPago") || "03",
                status: 'Vigente'
            };
        };

        // --- COMPONENTE DE TABLA REACTIVO ---
        const GastoRow = ({ cfdi, meta, onUpdate, bankMovement }) => {
            const [localDesc, setLocalDesc] = useState(meta.descripcion || '');
            const [localCta, setLocalCta] = useState(meta.ctaContable || '');
            const [localEtiq, setLocalEtiq] = useState(meta.etiqueta || '');

            useEffect(() => { setLocalDesc(meta.descripcion || ''); }, [meta.descripcion]);
            useEffect(() => { setLocalCta(meta.ctaContable || ''); }, [meta.ctaContable]);
            useEffect(() => { setLocalEtiq(meta.etiqueta || ''); }, [meta.etiqueta]);

            return (
                <tr className="hover:bg-amber-50/40 transition-colors border-b border-slate-100/70 group">
                    <td className="p-3 text-slate-500">{cfdi.fecha}</td>
                    <td className="p-3 font-sans font-bold text-slate-800 truncate max-w-[180px]" title={cfdi.nombreEmisor}>{cfdi.nombreEmisor}</td>
                    <td className="p-3 text-slate-400 font-mono text-[10px]" title={cfdi.uuid}>{cfdi.uuid.substring(0,8)}</td>
                    <td className="p-3 text-right text-slate-600">${cfdi.subtotal.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-right text-slate-600">${cfdi.iva.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-right font-bold text-slate-900">${cfdi.total.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-center">
                        {bankMovement ? 
                            <span className="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full truncate max-w-[120px] inline-block shadow-sm" title={bankMovement.referencia}>
                                <i data-lucide="check-circle" className="w-3 h-3 inline mr-1"></i> {bankMovement.referencia}
                            </span> 
                            : <span className="text-[10px] text-slate-300 font-bold bg-slate-100 px-2 py-1 rounded-full">Sin Match</span>
                        }
                    </td>
                    <td className="p-1.5 bg-amber-50/20 group-hover:bg-amber-50/50 transition-colors">
                        <input type="text" className="w-full bg-white border border-slate-200/60 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-2 ring-amber-100 font-sans shadow-sm transition-all"
                            placeholder={cfdi.concepto.substring(0,25) + '...'} value={localDesc} onChange={e => setLocalDesc(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'descripcion', localDesc)} />
                    </td>
                    <td className="p-1.5 bg-amber-50/20 group-hover:bg-amber-50/50 transition-colors">
                        <input type="text" className="w-full bg-white border border-slate-200/60 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-2 ring-amber-100 font-sans uppercase text-[10px] font-bold shadow-sm transition-all text-indigo-700"
                            placeholder="Ej: 601-01-001" value={localCta} onChange={e => setLocalCta(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'ctaContable', localCta)} />
                    </td>
                    <td className="p-1.5 bg-amber-50/20 group-hover:bg-amber-50/50 transition-colors">
                        <input type="text" className="w-full bg-white border border-slate-200/60 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-2 ring-amber-100 font-sans shadow-sm transition-all text-slate-700 font-medium"
                            placeholder="Ej: Software" value={localEtiq} onChange={e => setLocalEtiq(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'etiqueta', localEtiq)} />
                    </td>
                </tr>
            );
        };

        function App() {
            // --- ESTADOS DE INFRAESTRUCTURA FIREBASE ---
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'conciliamax-master';

            // --- ESTADOS MULTIEMPRESA ---
            const [companies, setCompanies] = useState([{ id: 'default', rfc: 'SIM100812NP3', razonSocial: 'SIMETRICAL S.A. DE C.V.' }]);
            const [activeCompanyId, setActiveCompanyId] = useState('default');
            const activeCompany = useMemo(() => companies.find(c => c.id === activeCompanyId) || companies[0], [companies, activeCompanyId]);

            // --- ESTADOS DE NAVEGACIÓN ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [xmlSubTab, setXmlSubTab] = useState('carga');
            const [toast, setToast] = useState(null);
            const triggerToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 4000); };

            // --- ESTADOS DE DATOS EN MEMORIA (Archivos Temporales) ---
            const [cfdis, setCfdis] = useState([]);
            const [bankMovements, setBankMovements] = useState([]);
            const [matches, setMatches] = useState({});
            const [accounts, setAccounts] = useState(DEFAULT_ACCOUNTS);

            // --- ESTADOS PERSISTENTES (Control de Gastos Meta) ---
            const [gastosMeta, setGastosMeta] = useState({});

            // --- ESTADOS IA & CONFIGURACIÓN ---
            const [apiProvider, setApiProvider] = useState(() => localStorage.getItem('cm_provider_v3') || 'google');
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('cm_key_v3') || '');
            const [apiModel, setApiModel] = useState(() => localStorage.getItem('cm_model_v3') || 'gemini-2.5-flash');
            const [showApiKey, setShowApiKey] = useState(false);
            const [testingConnection, setTestingConnection] = useState(false);
            
            const [aiSuggestions, setAiSuggestions] = useState({}); 
            const [loadingAiSug, setLoadingAiSug] = useState({}); 
            const [bulkAiLoading, setBulkAiLoading] = useState(false);
            
            const [aiReport, setAiReport] = useState("");
            const [loadingAiReport, setLoadingAiReport] = useState(false);
            
            const [dashboardInsight, setDashboardInsight] = useState(null);
            const [loadingInsight, setLoadingInsight] = useState(false);

            const [chatMessages, setChatMessages] = useState([{ sender: 'ia', text: '¡Hola! Soy tu Consultor Fiscal IA. Conozco las leyes vigentes del SAT. ¿En qué te puedo asesorar hoy?' }]);
            const [chatInput, setChatInput] = useState("");
            const [loadingChat, setLoadingChat] = useState(false);

            // Filtros y UI Adicional
            const [cfdiTypeFilter, setCfdiTypeFilter] = useState('Todos');
            const [bankMatchedFilter, setBankMatchedFilter] = useState('Todos');
            const [startingFolio, setStartingFolio] = useState(1);
            const [policyTypeMode, setPolicyTypeMode] = useState('auto');
            const [bankAccountCode, setBankAccountCode] = useState('102-01-001');

            // --- 1. INICIALIZAR FIREBASE Y AUTH ---
            useEffect(() => {
                if (typeof window.firebase === 'undefined' || typeof __firebase_config === 'undefined') return;
                try {
                    const config = JSON.parse(__firebase_config);
                    if (!window.firebase.apps.length) window.firebase.initializeApp(config);
                    const firestore = window.firebase.firestore();
                    setDb(firestore);

                    const auth = window.firebase.auth();
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    };
                    initAuth();

                    const unsub = auth.onAuthStateChanged(u => setUser(u));
                    return () => unsub();
                } catch (e) { console.error("Error Firebase Auth", e); }
            }, []);

            // --- 2. CARGAR EMPRESAS Y METADATA DE GASTOS DESDE FIRESTORE ---
            useEffect(() => {
                if (!user || !db) return;
                
                const compRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('companies');
                const unsubComp = compRef.onSnapshot(snap => {
                    const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (loaded.length > 0) {
                        setCompanies(loaded);
                        if (!loaded.find(c => c.id === activeCompanyId)) setActiveCompanyId(loaded[0].id);
                    }
                }, err => console.error("Error loading companies", err));

                const gastosRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('gastosMeta');
                const unsubGastos = gastosRef.onSnapshot(snap => {
                    const meta = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (data.companyId === activeCompanyId) meta[d.id] = data;
                    });
                    setGastosMeta(meta);
                });

                return () => { unsubComp(); unsubGastos(); };
            }, [user, db, activeCompanyId, appId]);

            // Re-render Icons
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // --- MANEJADORES DE LA NUBE Y ESTADO ---
            const handleAddCompany = async (e) => {
                e.preventDefault();
                const rfc = e.target.rfc.value.toUpperCase();
                const razon = e.target.razon.value;
                if (!rfc || !razon) return;
                
                if (user && db) {
                    const newRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('companies').doc();
                    await newRef.set({ rfc, razonSocial: razon });
                    triggerToast('🏢 Empresa guardada en Firebase.');
                } else {
                    setCompanies(prev => [...prev, { id: Math.random().toString(36).substr(2,9), rfc, razonSocial: razon }]);
                    triggerToast('🏢 Empresa agregada en memoria.');
                }
                e.target.reset();
            };

            const updateGastoMeta = (uuid, field, value) => {
                setGastosMeta(prev => ({
                    ...prev, [uuid]: { ...(prev[uuid] || {}), [field]: value, companyId: activeCompanyId }
                }));

                if (user && db) {
                    db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('gastosMeta').doc(uuid)
                        .set({ [field]: value, companyId: activeCompanyId }, { merge: true }).catch(e => console.error("Sync Err", e));
                }
            };

            const handleSaveConfigAPI = (e) => {
                e.preventDefault();
                localStorage.setItem('cm_provider_v3', apiProvider);
                localStorage.setItem('cm_key_v3', apiKey);
                localStorage.setItem('cm_model_v3', apiModel);
                triggerToast('⚙️ Claves IA actualizadas y encriptadas localmente.');
            };

            // --- MOTOR INTELIGENCIA ARTIFICIAL CORE ---
            const callAiAPI = async (prompt, systemPrompt = null, isJson = false, jsonSchema = null) => {
                const provider = localStorage.getItem('cm_provider_v3') || 'google';
                const key = localStorage.getItem('cm_key_v3') || '';
                const model = localStorage.getItem('cm_model_v3') || 'gemini-2.5-flash';

                if (!key) throw new Error("API Key requerida. Configúrala primero.");

                let url = "", headers = { "Content-Type": "application/json" }, bodyPayload = {};

                if (provider === 'google') {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    bodyPayload = { contents: [{ parts: [{ text: prompt }] }] };
                    if (systemPrompt) bodyPayload.systemInstruction = { parts: [{ text: systemPrompt }] };
                    if (isJson && jsonSchema) bodyPayload.generationConfig = { responseMimeType: "application/json", responseSchema: jsonSchema };
                } else if (provider === 'anthropic') {
                    url = "[https://api.anthropic.com/v1/messages](https://api.anthropic.com/v1/messages)";
                    headers = { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" };
                    let customPrompt = prompt;
                    if (isJson) customPrompt += "\nDevuelve UNICAMENTE un JSON válido. Cero markdown extra.";
                    bodyPayload = { model: model, max_tokens: 4000, messages: [{ role: "user", content: customPrompt }] };
                    if (systemPrompt) bodyPayload.system = systemPrompt;
                } else if (provider === 'openai' || provider === 'openrouter') {
                    url = provider === 'openai' ? "[https://api.openai.com/v1/chat/completions](https://api.openai.com/v1/chat/completions)" : "[https://openrouter.ai/api/v1/chat/completions](https://openrouter.ai/api/v1/chat/completions)";
                    headers = { "Content-Type": "application/json", "Authorization": `Bearer ${key}` };
                    if (provider === 'openrouter') { headers["HTTP-Referer"] = window.location.origin; headers["X-Title"] = "ConciliaMax ERP"; }
                    const messages = systemPrompt ? [{ role: "system", content: systemPrompt }] : [];
                    let customPrompt = prompt;
                    if (isJson) customPrompt += "\nDevuelve UNICAMENTE un JSON válido.";
                    messages.push({ role: "user", content: customPrompt });
                    bodyPayload = { model: model, messages: messages };
                    if (isJson && provider === 'openai') bodyPayload.response_format = { type: "json_object" };
                }

                for (let i = 0; i < 3; i++) {
                    try {
                        const response = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(bodyPayload) });
                        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                        const result = await response.json();
                        if (provider === 'google') return result.candidates?.[0]?.content?.parts?.[0]?.text;
                        else if (provider === 'anthropic') return result.content?.[0]?.text;
                        else return result.choices?.[0]?.message?.content;
                    } catch (err) {
                        if (i === 2) throw err;
                        await new Promise(resolve => setTimeout(resolve, [1000, 2000, 4000][i]));
                    }
                }
            };

            const handleTestConnection = async () => {
                if (!apiKey) return triggerToast('Introduce primero una API Key.');
                setTestingConnection(true);
                try {
                    const res = await callAiAPI("Responde únicamente 'CONECTADO'.", "Diagnóstico.");
                    if (res && res.toUpperCase().includes('CONECTADO')) triggerToast('✅ Ping a servidor IA exitoso.');
                    else triggerToast('⚠️ Conexión fallida: ' + res);
                } catch (err) { triggerToast('❌ Error: ' + err.message); } 
                finally { setTestingConnection(false); }
            };

            // --- CARGA DE DATOS LOCALES ---
            const handleLocalXmlUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                let parsed = [], errs = 0;
                
                for (let file of files) {
                    if (file.name.endsWith('.zip')) {
                        try {
                            const zip = await new JSZip().loadAsync(file);
                            for (let [path, zipEntry] of Object.entries(zip.files)) {
                                if (path.toLowerCase().endsWith('.xml') && !zipEntry.dir) {
                                    try { parsed.push(parseSingleXmlText(await zipEntry.async("string"), path, activeCompany.rfc)); } 
                                    catch(e) { errs++; }
                                }
                            }
                        } catch(e) { errs++; }
                    } else if (file.name.toLowerCase().endsWith('.xml')) {
                        try { parsed.push(parseSingleXmlText(await file.text(), file.name, activeCompany.rfc)); } 
                        catch(e) { errs++; }
                    }
                }
                
                if (parsed.length) {
                    setCfdis(prev => {
                        const existing = new Set(prev.map(c => c.uuid));
                        return [...prev, ...parsed.filter(c => !existing.has(c.uuid))];
                    });
                    setXmlSubTab('listado');
                    triggerToast(`📁 ${parsed.length} comprobantes procesados en RAM.`);
                }
            };

            const handleBankUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const DEMO_BANK_MOVEMENTS = [
                    { id: 1, fecha: '2025-12-04', referencia: 'ARRENDAMIENTO ASIA', descripcion: 'PAGO ASIA', cargo: 0, abono: 3340.96, tipo: 'Ingreso' },
                    { id: 2, fecha: '2025-12-09', referencia: 'PROEPTA', descripcion: 'MANTENIMIENTO', cargo: 180.09, abono: 0, tipo: 'Egreso' },
                    { id: 3, fecha: '2025-12-18', referencia: 'WALMART MX', descripcion: 'COMPRA PAPELERIA', cargo: 332.48, abono: 0, tipo: 'Egreso' },
                    { id: 4, fecha: '2025-12-16', referencia: 'RILE CUERNAVACA', descripcion: 'SPEI RECIBIDO', cargo: 0, abono: 16851.74, tipo: 'Ingreso' },
                    { id: 5, fecha: '2026-04-15', referencia: 'PAYPAL *GOOGLE', descripcion: 'SERVICIOS NUBE', cargo: 1753.92, abono: 0, tipo: 'Egreso' }
                ];
                setBankMovements(DEMO_BANK_MOVEMENTS);
                triggerToast('🏦 CSV Bancario mapeado en memoria.');

            // --- MÉTODOS DE INTELIGENCIA ARTIFICIAL AVANZADA ---

            // 1. Dashboard AI Insight
            const generateDashboardInsight = async () => {
                setLoadingInsight(true);
                const prompt = `Analiza la salud financiera de ${activeCompany.razonSocial} (RFC: ${activeCompany.rfc}).
Datos del mes:
- Ingresos Banco: $${dashboardStats.totalBancosIngreso}
- Egresos Banco: $${dashboardStats.totalBancosEgreso}
- Facturado Emitido (Ingreso CFDI): $${dashboardStats.totalCfdisEmitidos}
- Facturado Recibido (Gasto CFDI): $${dashboardStats.totalCfdisRecibidos}

Dime en un párrafo conciso y profesional de 3 a 4 líneas: ¿Hay riesgo de pagar muchos impuestos o hay discrepancia entre lo bancarizado y lo facturado?`;
                const sysPrompt = "Eres el CFO (Director Financiero) de la empresa. Directo, analítico, experto fiscal.";
                
                try {
                    const res = await callAiAPI(prompt, sysPrompt);
                    setDashboardInsight(res);
                } catch (error) { triggerToast("Error generando Insight: Configura la API."); } 
                finally { setLoadingInsight(false); }
            };

            // 2. Conciliación Inteligente Local
            const triggerSmartMatch = () => {
                if (!bankMovements.length || !cfdis.length) return triggerToast('Requiere Bancos y XMLs para operar.');
                const newMatches = { ...matches };
                let matchCount = 0;

                bankMovements.forEach(movement => {
                    if (newMatches[movement.id]) return;
                    const amount = movement.cargo > 0 ? movement.cargo : movement.abono;
                    const type = movement.cargo > 0 ? 'Recibido' : 'Emitido';

                    const potentialXml = cfdis.find(cfdi => {
                        const sameType = cfdi.tipo === type;
                        const sameAmount = Math.abs(cfdi.total - amount) < 0.05;
                        const free = !Object.values(newMatches).includes(cfdi.uuid);
                        if (sameType && sameAmount && free) {
                            const descrMatches = movement.descripcion.toLowerCase().includes(cfdi.nombreEmisor.split(' ')[0].toLowerCase()) || movement.referencia.toLowerCase().includes(cfdi.rfcEmisor.substring(0,4).toLowerCase());
                            return descrMatches || true; 
                        }
                        return false;
                    });
                    if (potentialXml) { newMatches[movement.id] = potentialXml.uuid; matchCount++; }
                });
                setMatches(newMatches);
                triggerToast(`🔗 Automatch: ${matchCount} movimientos cruzados.`);
            };

            // 3. Auto-Clasificación Masiva (Bulk AI) - NUEVA FUNCIONALIDAD
            const handleBulkAiCategorization = async () => {
                const uncategorized = cfdis.filter(c => c.tipo === 'Recibido' && !gastosMeta[c.uuid]?.ctaContable).slice(0, 15);
                if (uncategorized.length === 0) return triggerToast('Todos los gastos mostrados ya tienen cuenta contable.');

                setBulkAiLoading(true);
                const sysPrompt = "Actúas como un motor ERP backend automatizado. Recibes un catálogo y una lista de compras. Devuelve UNICAMENTE el JSON.";
                const userPrompt = `Catálogo Contable: ${JSON.stringify(accounts.map(a=>({cod:a.codigo, nom:a.nombre})))}\n\nFacturas a clasificar:\n` +
                    uncategorized.map(c => `- ID: ${c.uuid}, Prov: ${c.nombreEmisor}, Concepto: ${c.concepto.substring(0,100)}`).join('\n') +
                    `\n\nResponde estrictamente con un JSON que tenga este formato: { "resultados": [ {"uuid": "...", "codigoCta": "102...", "etiquetaCorta": "Mantenimiento"} ] }`;

                const schema = { type: "OBJECT", properties: { resultados: { type: "ARRAY", items: { type: "OBJECT", properties: { uuid: { type: "STRING" }, codigoCta: { type: "STRING" }, etiquetaCorta: { type: "STRING" } }, required: ["uuid", "codigoCta", "etiquetaCorta"] } } }, required: ["resultados"] };

                try {
                    const resText = await callAiAPI(userPrompt, sysPrompt, true, schema);
                    const parsed = safeParseJSON(resText);
                    if (parsed && parsed.resultados && Array.isArray(parsed.resultados)) {
                        parsed.resultados.forEach(item => {
                            if (item.uuid && item.codigoCta) {
                                updateGastoMeta(item.uuid, 'ctaContable', item.codigoCta);
                                updateGastoMeta(item.uuid, 'etiqueta', item.etiquetaCorta);
                            }
                        });
                        triggerToast(`✨ ¡Magia! ${parsed.resultados.length} gastos clasificados por la IA.`);
                    } else {
                        triggerToast('Error: El modelo no devolvió la estructura esperada.');
                    }
                } catch (error) {
                    triggerToast('❌ Error Bulk AI: ' + error.message);
                } finally {
                    setBulkAiLoading(false);
                }
            };

            // 4. Reporte y Chat
            const handleGenerateFiscalReport = async () => {

                bankMovements.forEach((mov) => {

                    const amount = mov.cargo > 0 ? mov.cargo : mov.abono;

                    const concepto = cfdi ? `Pago F. ${cfdi.uuid.substring(0,8)} - ${cfdi.tipo === 'Recibido' ? cfdi.nombreEmisor : cfdi.nombreReceptor}` : mov.descripcion;

                        const iva = cfdi ? cfdi.iva : (amount - subtotal);
                        entries.push({ cuenta: bankAccountCode, nombre: 'Bancos Nacionales', cargo: amount, abono: 0, rfc: '' });
                        entries.push({ cuenta: ctaAbono, nombre: 'Ingresos', cargo: 0, abono: subtotal, rfc: cfdi ? cfdi.rfcReceptor : '' });
                        entries.push({ cuenta: ctaIvaTr, nombre: 'IVA Trasladado', cargo: 0, abono: iva, rfc: cfdi ? cfdi.rfcReceptor : '' });
                    }
                    polizas.push({ id: mov.id, fecha: mov.fecha, tipo: tipoPoliza, numero: counter[tipoPoliza]++, concepto, movimientos: entries, uuidAsociado: cfdi ? cfdi.uuid : 'SIN_XML' });
                });
                return polizas;
            }, [bankMovements, matches, cfdis, bankAccountCode, accounts, startingFolio, policyTypeMode, gastosMeta]);

            const exportToExcelGastos = () => {
                if (!window.XLSX) return triggerToast('Error: Biblioteca XLSX no cargada.');
                const recibidos = cfdis.filter(c => c.tipo === 'Recibido');
                if (recibidos.length === 0) return triggerToast('No hay gastos para exportar.');
                const data = recibidos.map(c => {
                    const meta = gastosMeta[c.uuid] || {};
                    const matchId = Object.keys(matches).find(k => matches[k] === c.uuid);
                    const bankRef = matchId ? bankMovements.find(m => m.id == matchId)?.referencia : 'No Conciliado';

                    return {
                        'Fecha Egreso': c.fecha,
                        'Razon Social': c.nombreEmisor,
                        'RFC': c.rfcEmisor,
                        'Factura (UUID)': c.uuid,
                        'Base 16 (Subtotal)': c.subtotal,
                        'IVA': c.iva,
                        'Total': c.total,
                        'Referencia Banco': bankRef,
                        'Descripcion': meta.descripcion || c.concepto || '',
                        'CTA CONTABLE': meta.ctaContable || '',
                        'Etiqueta Gasto': meta.etiqueta || ''
                    };
                });
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Control_Gastos");
                XLSX.writeFile(wb, `Control_Gastos_${activeCompany.rfc}_${new Date().toISOString().split('T')[0]}.xlsx`);
                triggerToast('📊 Archivo de Control de Gastos exportado fielmente.');

            const exportToExcelConsolidated = () => {
                if (!window.XLSX) return triggerToast('⚠️ Error: Biblioteca Excel XLSX no localizada.');
                const wb = XLSX.utils.book_new();
                
                ['Emitido', 'Recibido', 'Nómina', 'Pago'].forEach(tipoStr => {
                    const sheetData = cfdis.filter(c => c.tipo === tipoStr).map(c => ({
                        'XML': `${c.uuid.substring(0, 8)}.xml`,

                        'UUID': c.uuid, 'Conceptos': c.concepto
                    }));
                    if(sheetData.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheetData), tipoStr);
                });
                if(wb.SheetNames.length === 0) return triggerToast('No hay datos para exportar.');
                XLSX.writeFile(wb, `Reporte_XMLs_${activeCompany.rfc}.xlsx`);
                triggerToast('📊 Reporte Consolidado SAT exportado.');
            };

            const downloadContpaqiPolizas = () => {
                if (generatedPolizas.length === 0) return triggerToast('Realiza la conciliación para generar pólizas.');
                let txtContent = "";
                generatedPolizas.forEach(p => {
                    const tipoNum = p.tipo === 'Ingreso' ? '1' : p.tipo === 'Egreso' ? '2' : '3';
                    const cleanConcepto = p.concepto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").substring(0, 99);
                    txtContent += `P  ${p.fecha.replace(/-/g, '')}   ${tipoNum}        ${p.numero} 0 0.00 ${cleanConcepto}\n`;

                            <div className="flex items-center gap-4 text-sm font-sans">
                                <div className="flex flex-col items-end">

                                        </div>
                                        <div className="shrink-0">

                                                className="bg-white text-indigo-900 px-5 py-2.5 rounded-lg font-bold text-xs hover:bg-indigo-50 transition-colors shadow-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">

                                                                    </div>
                                                                ) : (
                                                                    <select onChange={(e) => { if(e.target.value){setMatches({...matches, [mov.id]: e.target.value}); triggerToast('Vinculado Exitosamente.');} }} className="text-[10px] border border-slate-200 bg-slate-50 rounded p-1.5 w-full max-w-[200px] outline-none font-bold text-slate-600 focus:border-indigo-400">
                                                                        <option value="">Buscar CFDI coincidente...</option>
                                                                        {cfdis.filter(c => !Object.values(matches).includes(c.uuid) && Math.abs(c.total - amount) < 1).map(c => <option key={c.uuid} value={c.uuid}>${c.total.toFixed(2)} - {c.nombreEmisor}</option>)}
                                                                    </select>
                                                                )}
                                                            </td>
                                                            <td className="p-3 text-center">
                                                                {matchedUuid && <button onClick={() => {const c={...matches}; delete c[mov.id]; setMatches(c);}} className="text-rose-400 hover:text-rose-600 transition-colors"><i data-lucide="x-circle" className="w-5 h-5"></i></button>}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {bankMovements.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-slate-400 italic">Importa tu estado de cuenta en la pestaña "Bancos" para iniciar.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* ======================================= */}
                            {/* TAB: PÓLIZAS CONTPAQI / ALEGRA          */}
                            {/* ======================================= */}
                            {activeTab === 'polizas' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4">
                                        <div>
                                            <h3 className="font-bold text-lg">Exportador de Pólizas ERP</h3>
                                            <p className="text-xs text-slate-500">Asientos generados dinámicamente con las cuentas definidas en <strong>Control de Gastos</strong>.</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={downloadContpaqiPolizas} className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 px-5 rounded-lg text-xs shadow-md transition-colors flex items-center gap-2"><i data-lucide="download" className="w-4 h-4"></i> Descargar TXT CONTPAQi</button>
                                        </div>
                                    </div>
                                    <div className="space-y-4 font-mono text-xs">
                                        {generatedPolizas.slice(0, 50).map(p => (
                                            <div key={p.id} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                                                <div className="bg-slate-50 p-4 border-b flex justify-between font-sans items-center">
                                                    <span className="font-bold text-slate-700 bg-white px-2 py-1 rounded shadow-sm border border-slate-100">Póliza de {p.tipo} #{p.numero} - <span className="text-indigo-600">{p.fecha}</span></span>
                                                    <span className="text-[10px] text-slate-400 border border-slate-200 px-2 py-0.5 rounded-full">{p.uuidAsociado.substring(0,18)}</span>
                                                </div>
                                                <div className="p-4 overflow-x-auto">
                                                    <table className="w-full text-left">
                                                        <thead className="border-b text-slate-400 text-[10px] font-sans uppercase tracking-wider"><tr><th className="py-1">Cta. Contable</th><th>Nombre Cuenta</th><th className="text-right">Debe (Cargo)</th><th className="text-right">Haber (Abono)</th></tr></thead>
                                                        <tbody>
                                                            {p.movimientos.map((m, idx) => (
                                                                <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50/50">
                                                                    <td className="py-2.5 font-bold text-slate-800">{m.cuenta}</td>
                                                                    <td className="font-sans text-slate-600 font-medium">{m.nombre}</td>
                                                                    <td className="text-right font-bold text-emerald-700">${m.cargo.toLocaleString('es-MX', {minimumFractionDigits:2})}</td>
                                                                    <td className="text-right font-bold text-rose-700">${m.abono.toLocaleString('es-MX', {minimumFractionDigits:2})}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        ))}
                                        {generatedPolizas.length === 0 && <div className="text-center p-8 bg-white rounded-xl border border-slate-200 text-slate-400 font-sans italic">Genera matches en Conciliación para previsualizar las pólizas.</div>}
                                    </div>
                                </div>
                            )}

                            {/* ======================================= */}
                            {/* TAB: CATÁLOGO                           */}
                            {/* ======================================= */}
                            {activeTab === 'catalogo' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-fit md:col-span-1">
                                        <h3 className="font-bold mb-4 text-base">Cuentas Contables</h3>
                                        <form onSubmit={(e) => { e.preventDefault(); setAccounts([...accounts, {codigo: e.target.codigo.value, nombre: e.target.nombre.value, tipo: 'Egreso'}]); triggerToast('Cuenta Agregada'); e.target.reset(); }} className="space-y-4 text-xs mb-6">
                                            <div>
                                                <label className="font-bold text-slate-500 mb-1 block">Código</label>
                                                <input name="codigo" placeholder="Ej: 601-01-001" className="w-full bg-slate-50 border border-slate-200 rounded p-2 outline-none focus:border-indigo-400 font-mono" required />
                                            </div>
                                            <div>
                                                <label className="font-bold text-slate-500 mb-1 block">Nombre</label>
                                                <input name="nombre" placeholder="Ej: Gastos IT" className="w-full bg-slate-50 border border-slate-200 rounded p-2 outline-none focus:border-indigo-400" required />
                                            </div>
                                            <button className="bg-slate-900 text-white w-full py-2.5 rounded-lg font-bold hover:bg-slate-800 transition-colors shadow-sm">Guardar Cuenta</button>
                                        </form>
                                        <div className="border-2 border-dashed border-slate-200 p-6 text-center cursor-pointer hover:bg-slate-50 relative rounded-xl transition-colors">
                                            <input type="file" onChange={handleCatalogUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <i data-lucide="file-spreadsheet" className="w-6 h-6 text-slate-400 mx-auto mb-2"></i>
                                            <span className="text-xs font-bold text-slate-600">Importar Catálogo CSV</span>
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-[600px] overflow-y-auto md:col-span-2">
                                        <div className="flex justify-between items-center mb-4 sticky top-0 bg-white pb-2 border-b border-slate-100">
                                            <h3 className="font-bold text-base">Mapeo Activo</h3>
                                            <span className="text-xs bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md font-bold">{accounts.length} Cuentas</span>
                                        </div>
                                        <table className="w-full text-xs text-left font-mono">
                                            <tbody>
                                                {accounts.map(a => (
                                                    <tr key={a.codigo} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                        <td className="py-3 font-bold text-slate-800 w-32">{a.codigo}</td>
                                                        <td className="font-sans text-slate-600">{a.nombre}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* ======================================= */}
                            {/* TAB: CONSULTOR IA                       */}
                            {/* ======================================= */}
                            {activeTab === 'consultor-ia' && (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col h-[600px]">
                                        <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-4">
                                            <h3 className="font-bold text-base flex items-center gap-2"><i data-lucide="file-check-2" className="text-indigo-500"></i> Auditoría Fiscal SAT</h3>
                                            <button onClick={handleGenerateFiscalReport} disabled={loadingAiReport} className="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-800 transition-colors shadow-sm">{loadingAiReport ? 'Redactando...' : 'Generar Reporte'}</button>
                                        </div>
                                        <div className="flex-1 bg-slate-50 p-5 rounded-lg border border-slate-200 text-[13px] overflow-y-auto whitespace-pre-wrap font-sans text-slate-700 leading-relaxed">
                                            {aiReport ? aiReport : (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 italic">
                                                    <i data-lucide="file-text" className="w-12 h-12 mb-3 text-slate-300"></i>
                                                    El agente evaluará retenciones, IVA y discrepancia fiscal.
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col h-[600px]">
                                        <div className="border-b border-slate-100 pb-4 mb-4">
                                            <h3 className="font-bold text-base flex items-center gap-2"><i data-lucide="bot" className="text-emerald-500"></i> Chat Fiscal Leyes Mexicanas</h3>
                                            <p className="text-[10px] text-slate-500 mt-1">Conoce NIF, LISR, CFF y LIVA.</p>
                                        </div>
                                        <div className="flex-1 overflow-y-auto bg-slate-50/50 p-4 rounded-lg mb-4 space-y-4">
                                            {chatMessages.map((m, i) => (
                                                <div key={i} className={`flex ${m.sender==='user'?'justify-end':'justify-start'}`}>
                                                    <div className={`p-3.5 rounded-xl max-w-[85%] text-xs leading-relaxed shadow-sm ${m.sender==='user'?'bg-indigo-600 text-white rounded-tr-none':'bg-white border border-slate-200 rounded-tl-none text-slate-700'}`}>
                                                        <span className="block text-[9px] uppercase tracking-wider mb-1 opacity-70 font-bold">{m.sender === 'user' ? 'Tú' : 'Asesor IA'}</span>
                                                        {m.text}
                                                    </div>
                                                </div>
                                            ))}
                                            {loadingChat && <div className="text-xs text-indigo-400 animate-pulse font-bold ml-2">IA escribiendo respuesta...</div>}
                                        </div>
                                        <form onSubmit={handleSendChatMessage} className="flex gap-2">
                                            <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} disabled={loadingChat} className="flex-1 border border-slate-300 rounded-lg p-3 text-xs outline-none focus:border-indigo-500 transition-colors shadow-sm" placeholder="Ej: ¿Un egreso no facturado cuenta como deducción?" />
                                            <button disabled={loadingChat || !chatInput.trim()} className="bg-indigo-600 text-white px-5 py-3 rounded-lg text-xs font-bold hover:bg-indigo-700 transition-colors disabled:opacity-50 shadow-sm"><i data-lucide="send" className="w-4 h-4"></i></button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* ======================================= */}
                            {/* TAB: CONFIGURACIÓN MULTIEMPRESA & IA    */}
                            {/* ======================================= */}
                            {activeTab === 'configuracion' && (
                                <div className="max-w-3xl mx-auto space-y-6 animate-fade-in">
                                    
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-indigo-500">
                                        <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="building-2"></i> Gestión Multiempresa Segura</h3>
                                        <p className="text-xs text-slate-500 mb-6">Administra múltiples perfiles de empresas. Sincronizado en tiempo real en la nube segura de Firebase.</p>
                                        
                                        <div className="space-y-3 mb-6 max-h-[250px] overflow-y-auto pr-2">
                                            {companies.map(c => (
                                                <div key={c.id} className={`flex items-center justify-between p-4 rounded-lg border transition-all ${activeCompanyId === c.id ? 'border-indigo-500 bg-indigo-50 shadow-sm' : 'border-slate-200 bg-white hover:border-indigo-300 cursor-pointer'}`} onClick={() => setActiveCompanyId(c.id)}>
                                                    <div>
                                                        <div className="font-bold text-sm text-slate-800">{c.razonSocial}</div>
                                                        <div className="font-mono text-xs text-slate-500 mt-1">{c.rfc}</div>
                                                    </div>
                                                    {activeCompanyId === c.id && <span className="bg-indigo-600 text-white text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">Operando</span>}
                                                </div>
                                            ))}
                                        </div>

                                        <form onSubmit={handleAddCompany} className="bg-slate-50 p-5 rounded-lg border border-slate-200 border-dashed">
                                            <h4 className="font-bold text-xs uppercase tracking-wider text-slate-600 mb-4 flex items-center gap-2"><i data-lucide="plus-circle" className="w-4 h-4 text-indigo-500"></i> Registrar Nuevo RFC</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <input name="rfc" type="text" placeholder="RFC (12-13 caracteres)" required maxLength={13} className="border border-slate-300 rounded-lg px-3 py-2.5 text-sm uppercase font-mono outline-none focus:border-indigo-500 focus:ring-1 ring-indigo-500" />
                                                <input name="razon" type="text" placeholder="Razón Social Oficial" required className="border border-slate-300 rounded-lg px-3 py-2.5 text-sm font-sans outline-none focus:border-indigo-500 focus:ring-1 ring-indigo-500" />
                                            </div>
                                            <button type="submit" className="mt-4 bg-slate-900 text-white px-6 py-2.5 rounded-lg text-xs font-bold hover:bg-slate-800 transition-colors shadow-sm">
                                                Agregar Perfil
                                            </button>
                                        </form>
                                    </div>

                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-emerald-500">
                                        <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="brain-circuit"></i> Conexión Inteligencia Artificial</h3>
                                        <form onSubmit={handleSaveConfigAPI} className="space-y-4 text-xs font-sans">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-slate-500 font-bold mb-1.5 uppercase tracking-wider text-[10px]">Proveedor LLM</label>
                                                    <select value={apiProvider} onChange={e => { setApiProvider(e.target.value); setApiModel(PROVIDER_MODELS[e.target.value][0].value); }} className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2.5 px-3 font-semibold outline-none focus:border-emerald-500">
                                                        <option value="google">Google AI Studio (Gemini)</option>
                                                        <option value="anthropic">Anthropic Console (Claude)</option>
                                                        <option value="openai">OpenAI (GPT)</option>
                                                        <option value="openrouter">OpenRouter</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-slate-500 font-bold mb-1.5 uppercase tracking-wider text-[10px]">Modelo</label>
                                                    <select value={apiModel} onChange={e => setApiModel(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2.5 px-3 font-semibold outline-none focus:border-emerald-500">
                                                        {PROVIDER_MODELS[apiProvider]?.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 font-bold mb-1.5 uppercase tracking-wider text-[10px]">API Key Privada</label>
                                                <input type={showApiKey ? "text" : "password"} value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-..." className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2.5 px-3 font-mono outline-none focus:border-emerald-500" />
                                            </div>
                                            <div className="flex gap-2 pt-3 border-t border-slate-100 mt-4">
                                                <button type="submit" className="bg-emerald-500 text-slate-950 hover:bg-emerald-600 transition-colors font-bold py-2.5 px-6 rounded-lg shadow-sm">Guardar API</button>
                                                <button type="button" onClick={handleTestConnection} className="border border-slate-300 hover:bg-slate-50 transition-colors text-slate-700 font-bold py-2.5 px-6 rounded-lg">{testingConnection ? 'Probando...' : 'Probar Conexión'}</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
