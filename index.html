                                            {companies.map(c => (
                                                <div key={c.id} className={`flex items-center justify-between p-4 rounded-lg border transition-all ${activeCompanyId === c.id ? 'border-indigo-500 bg-indigo-50 shadow-sm' : 'border-slate-200 bg-white hover:border-indigo-300'}`}>
                                                    <div>
                                                        <div className="font-bold text-sm text-slate-800">{c.razonSocial}</div>
                                                        <div className="font-mono text-xs text-slate-500 mt-1">{c.rfc}</div>
                                                    </div>
                                                    {activeCompanyId === c.id && <span className="bg-indigo-600 text-white text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">Operando</span>}
                                                </div>
                                            ))}
                                        </div>

                                        <form onSubmit={handleAddCompany} className="bg-slate-50 p-5 rounded-lg border border-slate-200 border-dashed">
                                            <h4 className="font-bold text-xs uppercase tracking-wider text-slate-600 mb-4 flex items-center gap-2"><i data-lucide="plus-circle" className="w-4 h-4"></i> Registrar Nuevo RFC</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <input name="rfc" type="text" placeholder="RFC (12-13 caracteres)" required maxLength={13} className="border border-slate-300 rounded px-3 py-2.5 text-sm uppercase font-mono outline-none focus:border-indigo-500" />
                                                <input name="razon" type="text" placeholder="Razón Social Oficial" required className="border border-slate-300 rounded px-3 py-2.5 text-sm font-sans outline-none focus:border-indigo-500" />
                                            </div>
                                            <button type="submit" className="mt-4 bg-slate-900 text-white px-5 py-2.5 rounded text-xs font-bold hover:bg-slate-800 transition-colors">
                                                Agregar Perfil
                                            </button>
                                        </form>
                                    </div>

                                    {/* Módulo API LLM */}
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-emerald-500">
                                        <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="brain-circuit"></i> Conexión Inteligencia Artificial</h3>
                                        <form onSubmit={handleSaveConfigAPI} className="space-y-4 text-xs font-sans">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-slate-500 font-bold mb-1.5 uppercase">Proveedor LLM</label>
                                                    <select value={apiProvider} onChange={e => { setApiProvider(e.target.value); setApiModel(PROVIDER_MODELS[e.target.value][0].value); }} className="w-full bg-slate-50 border rounded-lg py-2.5 px-3 font-semibold">
                                                        <option value="google">Google AI Studio (Gemini)</option>
                                                        <option value="anthropic">Anthropic Console (Claude)</option>
                                                        <option value="openai">OpenAI (GPT)</option>
                                                        <option value="openrouter">OpenRouter</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-slate-500 font-bold mb-1.5 uppercase">Modelo</label>
                                                    <select value={apiModel} onChange={e => setApiModel(e.target.value)} className="w-full bg-slate-50 border rounded-lg py-2.5 px-3 font-semibold">
                                                        {PROVIDER_MODELS[apiProvider]?.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 font-bold mb-1.5 uppercase">API Key Privada</label>
                                                <input type={showApiKey ? "text" : "password"} value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-..." className="w-full bg-slate-50 border rounded-lg py-2.5 px-3 font-mono" />
                                            </div>
                                            <div className="flex gap-2 pt-2">
                                                <button type="submit" className="bg-emerald-500 text-slate-950 font-bold py-2.5 px-6 rounded-lg">Guardar API</button>
                                                <button type="button" onClick={handleTestConnection} className="border font-bold py-2.5 px-6 rounded-lg">{testingConnection ? 'Probando...' : 'Probar Conexión'}</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
