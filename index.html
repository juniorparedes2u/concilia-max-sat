<body class="text-slate-900 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONSTANTES Y DATOS POR DEFECTO ---
        const PROVIDER_MODELS = {
            google: [
                { value: 'gemini-2.5-flash', label: 'gemini-2.5-flash (Balance óptimo)' },
                { value: 'gemini-2.5-pro', label: 'gemini-2.5-pro (Auditorías de alta precisión)' },
                { value: 'gemini-1.5-flash', label: 'gemini-1.5-flash (Velocidad)' }
            ],
            anthropic: [
                { value: 'claude-3-5-sonnet-latest', label: 'claude-3-5-sonnet-latest (Precisión)' },
                { value: 'claude-3-5-haiku-latest', label: 'claude-3-5-haiku-latest (Económico)' }
            ],
            openai: [
                { value: 'gpt-4o', label: 'gpt-4o (Insignia)' },
                { value: 'gpt-4o-mini', label: 'gpt-4o-mini (Rápido)' },
                { value: 'o1-mini', label: 'o1-mini (Razonamiento)' }
            ],
            openrouter: [
                { value: 'google/gemini-2.5-flash', label: 'OR: Google Gemini 2.5 Flash' },
                { value: 'anthropic/claude-3.5-sonnet', label: 'OR: Anthropic Claude 3.5 Sonnet' }
            ]
        };

        const DEFAULT_ACCOUNTS = [
            { codigo: '102-01-001', nombre: 'Bancos Nacionales - BBVA', tipo: 'Activo' },
            { codigo: '105-01-001', nombre: 'Clientes Nacionales', tipo: 'Activo' },
            { codigo: '118-01-001', nombre: 'IVA Acreditable Pagado', tipo: 'Activo' },
            { codigo: '201-01-001', nombre: 'Proveedores', tipo: 'Pasivo' },
            { codigo: '213-01-001', nombre: 'IVA Trasladado Cobrado', tipo: 'Pasivo' },
            { codigo: '401-01-001', nombre: 'Ingresos por Servicios', tipo: 'Ingreso' },
            { codigo: '601-01-001', nombre: 'Gastos de Oficina y Papelería', tipo: 'Egreso' },
            { codigo: '601-01-002', nombre: 'Gastos de Mantenimiento General', tipo: 'Egreso' },
            { codigo: '601-01-003', nombre: 'Licenciamiento de Software', tipo: 'Egreso' }
        ];

        // --- FUNCIONES AUXILIARES ---
        const safeParseJSON = (text) => {
            if (!text) return null;
            let clean = text.trim();
            if (clean.startsWith('```json')) clean = clean.substring(7);
            else if (clean.startsWith('```')) clean = clean.substring(3);
            if (clean.endsWith('```')) clean = clean.substring(0, clean.length - 3);
            try { return JSON.parse(clean.trim()); } catch (e) { return null; }
        };

        const getElementByLocalName = (parent, localName) => {
            if (!parent) return null;
            const tags = parent.getElementsByTagName('*');
            for (let i = 0; i < tags.length; i++) {
                const nodeLocalName = tags[i].localName || tags[i].tagName.split(':').pop();
                if (nodeLocalName && nodeLocalName.toLowerCase() === localName.toLowerCase()) return tags[i];
            }
            return null;
        };

        const getAttrIgnoreCase = (element, attrName) => {
            if (!element) return null;
            let val = element.getAttribute(attrName);
            if (val !== null) return val;
            for (let i = 0; i < element.attributes.length; i++) {
                const cleanName = element.attributes[i].name.split(':').pop().toLowerCase();
                if (cleanName === attrName.toLowerCase()) return element.attributes[i].value;
            }
            return null;
        };

        const parseSingleXmlText = (xmlText, fileName, currentRfc) => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            if (xmlDoc.getElementsByTagName("parsererror").length > 0) throw new Error("XML ilegible");

            const comp = getElementByLocalName(xmlDoc, "Comprobante");
            const emisor = getElementByLocalName(xmlDoc, "Emisor");
            const receptor = getElementByLocalName(xmlDoc, "Receptor");
            const timbre = getElementByLocalName(xmlDoc, "TimbreFiscalDigital");
            
            if (!comp) throw new Error("No CFDI");

            const uuid = timbre ? getAttrIgnoreCase(timbre, "UUID") : `LOC-${Math.random().toString(36).substr(2,9)}`;
            const rfcEmisor = (getAttrIgnoreCase(emisor, "Rfc") || "X").toUpperCase();
            const rfcReceptor = (getAttrIgnoreCase(receptor, "Rfc") || "X").toUpperCase();
            
            let tipo = "Recibido";
            const tipoComp = getAttrIgnoreCase(comp, "TipoDeComprobante") || "I";
            if (tipoComp.toUpperCase() === 'N' || getElementByLocalName(xmlDoc, "Nomina")) tipo = "Nómina";
            else if (tipoComp.toUpperCase() === 'P' || getElementByLocalName(xmlDoc, "Pagos")) tipo = "Pago";
            else if (rfcEmisor === currentRfc) tipo = "Emitido";

            const conceptos = Array.from(xmlDoc.getElementsByTagName('*')).filter(t => (t.localName || t.tagName.split(':').pop()).toLowerCase() === 'concepto');
            const conceptoStr = conceptos.map(c => getAttrIgnoreCase(c, "Descripcion")).filter(Boolean).join(", ");

            return {
                uuid,
                fecha: getAttrIgnoreCase(comp, "Fecha")?.substring(0, 10) || new Date().toISOString().substring(0, 10),
                rfcEmisor, nombreEmisor: getAttrIgnoreCase(emisor, "Nombre") || "Proveedor",
                rfcReceptor, nombreReceptor: getAttrIgnoreCase(receptor, "Nombre") || "Cliente",
                total: parseFloat(getAttrIgnoreCase(comp, "Total") || 0),
                subtotal: parseFloat(getAttrIgnoreCase(comp, "SubTotal") || 0),
                iva: parseFloat(getAttrIgnoreCase(comp, "Total") || 0) - parseFloat(getAttrIgnoreCase(comp, "SubTotal") || 0),
                tipo,
                concepto: conceptoStr,
                metodoPago: getAttrIgnoreCase(comp, "MetodoPago") || "PUE",
                formaPago: getAttrIgnoreCase(comp, "FormaPago") || "03",
                status: 'Vigente'
            };
        };

        // Componente Fila de Gasto (Para manejar el estado del input optimizado sin lag)
        const GastoRow = ({ cfdi, meta, onUpdate, bankMovement }) => {
            const [localDesc, setLocalDesc] = useState(meta.descripcion || '');
            const [localCta, setLocalCta] = useState(meta.ctaContable || '');
            const [localEtiq, setLocalEtiq] = useState(meta.etiqueta || '');

            useEffect(() => { setLocalDesc(meta.descripcion || ''); }, [meta.descripcion]);
            useEffect(() => { setLocalCta(meta.ctaContable || ''); }, [meta.ctaContable]);
            useEffect(() => { setLocalEtiq(meta.etiqueta || ''); }, [meta.etiqueta]);

            return (
                <tr className="hover:bg-slate-50/50 transition-colors border-b border-slate-100">
                    <td className="p-3">{cfdi.fecha}</td>
                    <td className="p-3 font-sans font-semibold text-slate-800 truncate max-w-[180px]" title={cfdi.nombreEmisor}>{cfdi.nombreEmisor}</td>
                    <td className="p-3 text-slate-400 font-mono text-[10px]" title={cfdi.uuid}>{cfdi.uuid.substring(0,8)}</td>
                    <td className="p-3 text-right">${cfdi.subtotal.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-right">${cfdi.iva.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-right font-bold text-slate-900">${cfdi.total.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-center">
                        {bankMovement ? 
                            <span className="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full truncate max-w-[120px] inline-block" title={bankMovement.referencia}>
                                <i data-lucide="check-circle" className="w-3 h-3 inline mr-1"></i> {bankMovement.referencia}
                            </span> 
                            : <span className="text-[10px] text-slate-300">-</span>
                        }
                    </td>
                    <td className="p-1.5 bg-amber-50/20">
                        <input type="text" className="w-full bg-white border border-slate-200 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-1 ring-amber-400 font-sans"
                            placeholder={cfdi.concepto.substring(0,25) + '...'} value={localDesc} onChange={e => setLocalDesc(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'descripcion', localDesc)} />
                    </td>
                    <td className="p-1.5 bg-amber-50/20">
                        <input type="text" className="w-full bg-white border border-slate-200 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-1 ring-amber-400 font-sans uppercase text-[10px] font-bold"
                            placeholder="Ej: 601-01-001" value={localCta} onChange={e => setLocalCta(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'ctaContable', localCta)} />
                    </td>
                    <td className="p-1.5 bg-amber-50/20">
                        <input type="text" className="w-full bg-white border border-slate-200 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-1 ring-amber-400 font-sans"
                            placeholder="Ej: Software" value={localEtiq} onChange={e => setLocalEtiq(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'etiqueta', localEtiq)} />
                    </td>
                </tr>
            );
        };

        function App() {
            // --- ESTADOS DE INFRAESTRUCTURA FIREBASE ---
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'conciliamax-master';

            // --- ESTADOS MULTIEMPRESA ---
            const [companies, setCompanies] = useState([{ id: 'default', rfc: 'SIM100812NP3', razonSocial: 'SIMETRICAL S.A. DE C.V.' }]);
            const [activeCompanyId, setActiveCompanyId] = useState('default');
            const activeCompany = useMemo(() => companies.find(c => c.id === activeCompanyId) || companies[0], [companies, activeCompanyId]);

            // --- ESTADOS DE NAVEGACIÓN ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [xmlSubTab, setXmlSubTab] = useState('carga');
            const [toast, setToast] = useState(null);
            const triggerToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 4000); };

            // --- ESTADOS DE DATOS EN MEMORIA (Archivos Temporales) ---
            const [cfdis, setCfdis] = useState([]);
            const [bankMovements, setBankMovements] = useState([]);
            const [matches, setMatches] = useState({});
            const [accounts, setAccounts] = useState(DEFAULT_ACCOUNTS);
            const [selectedCfdi, setSelectedCfdi] = useState(null);

            // --- ESTADOS PERSISTENTES (Control de Gastos Meta) ---
            const [gastosMeta, setGastosMeta] = useState({}); // { uuid: { descripcion, ctaContable, etiqueta, companyId } }

            // --- ESTADOS IA & CONFIGURACIÓN ---
            const [apiProvider, setApiProvider] = useState(() => localStorage.getItem('cm_provider_v3') || 'google');
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('cm_key_v3') || '');
            const [apiModel, setApiModel] = useState(() => localStorage.getItem('cm_model_v3') || 'gemini-2.5-flash');
            const [showApiKey, setShowApiKey] = useState(false);
            const [testingConnection, setTestingConnection] = useState(false);
            
            const [aiSuggestions, setAiSuggestions] = useState({}); 
            const [loadingAiSug, setLoadingAiSug] = useState({}); 
            const [aiReport, setAiReport] = useState("");
            const [loadingAiReport, setLoadingAiReport] = useState(false);
            const [chatMessages, setChatMessages] = useState([{ sender: 'ia', text: '¡Hola! Soy tu Consultor Fiscal IA. Puedo ayudarte a clasificar transacciones contables o preparar reportes.' }]);
            const [chatInput, setChatInput] = useState("");
            const [loadingChat, setLoadingChat] = useState(false);

            // Filtros y UI Adicional
            const [cfdiTypeFilter, setCfdiTypeFilter] = useState('Todos');
            const [bankMatchedFilter, setBankMatchedFilter] = useState('Todos');
            const [accountSearchQuery, setAccountSearchQuery] = useState('');
            const [startingFolio, setStartingFolio] = useState(1);
            const [policyTypeMode, setPolicyTypeMode] = useState('auto');
            const [bankAccountCode, setBankAccountCode] = useState('102-01-001');

            // --- 1. INICIALIZAR FIREBASE Y AUTH ---
            useEffect(() => {
                if (typeof window.firebase === 'undefined' || typeof __firebase_config === 'undefined') return;
                try {
                    const config = JSON.parse(__firebase_config);
                    if (!window.firebase.apps.length) window.firebase.initializeApp(config);
                    const firestore = window.firebase.firestore();
                    setDb(firestore);

                    const auth = window.firebase.auth();
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    };
                    initAuth();

                    const unsub = auth.onAuthStateChanged(u => setUser(u));
                    return () => unsub();
                } catch (e) { console.error("Error Firebase Auth", e); }
            }, []);

            // --- 2. CARGAR EMPRESAS Y METADATA DE GASTOS DESDE FIRESTORE ---
            useEffect(() => {
                if (!user || !db) return;
                
                // Cargar Perfiles de Empresas
                const compRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('companies');
                const unsubComp = compRef.onSnapshot(snap => {
                    const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (loaded.length > 0) {
                        setCompanies(loaded);
                        if (!loaded.find(c => c.id === activeCompanyId)) setActiveCompanyId(loaded[0].id);
                    }
                }, err => console.error("Error loading companies", err));

                // Cargar Control de Gastos (Filtrado en memoria por Regla 2)
                const gastosRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('gastosMeta');
                const unsubGastos = gastosRef.onSnapshot(snap => {
                    const meta = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (data.companyId === activeCompanyId) { // Filtrado en JS Memory
                            meta[d.id] = data;
                        }
                    });
                    setGastosMeta(meta);
                });

                return () => { unsubComp(); unsubGastos(); };
            }, [user, db, activeCompanyId, appId]);

            // Re-render Icons
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // --- MANEJADORES DE LA NUBE Y ESTADO ---
            const handleAddCompany = async (e) => {
                e.preventDefault();
                const rfc = e.target.rfc.value.toUpperCase();
                const razon = e.target.razon.value;
                if (!rfc || !razon) return;
                
                if (user && db) {
                    const newRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('companies').doc();
                    await newRef.set({ rfc, razonSocial: razon });
                    triggerToast('🏢 Empresa agregada a la nube de forma exitosa.');
                } else {
                    setCompanies(prev => [...prev, { id: Math.random().toString(36).substr(2,9), rfc, razonSocial: razon }]);
                    triggerToast('🏢 Empresa agregada localmente.');
                }
                e.target.reset();
            };

            const updateGastoMeta = (uuid, field, value) => {
                setGastosMeta(prev => ({
                    ...prev, [uuid]: { ...(prev[uuid] || {}), [field]: value, companyId: activeCompanyId }
                }));

                if (user && db) {
                    const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('gastosMeta').doc(uuid);
                    docRef.set({ [field]: value, companyId: activeCompanyId }, { merge: true }).catch(e => console.error("Sync Err", e));
                }
            };

            const handleSaveConfigAPI = (e) => {
                e.preventDefault();
                localStorage.setItem('cm_provider_v3', apiProvider);
                localStorage.setItem('cm_key_v3', apiKey);
                localStorage.setItem('cm_model_v3', apiModel);
                triggerToast('⚙️ Configuración de API de Inteligencia Artificial guardada.');
            };

            // --- COMUNICACIÓN IA LLM ---
            const callAiAPI = async (prompt, systemPrompt = null, isJson = false, jsonSchema = null) => {
                const provider = localStorage.getItem('cm_provider_v3') || 'google';
                const key = localStorage.getItem('cm_key_v3') || '';
                const model = localStorage.getItem('cm_model_v3') || 'gemini-2.5-flash';

                if (!key) throw new Error("API Key no configurada. Ve a Configuración.");

                let url = "", headers = { "Content-Type": "application/json" }, bodyPayload = {};

                if (provider === 'google') {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    bodyPayload = { contents: [{ parts: [{ text: prompt }] }] };
                    if (systemPrompt) bodyPayload.systemInstruction = { parts: [{ text: systemPrompt }] };
                    if (isJson && jsonSchema) bodyPayload.generationConfig = { responseMimeType: "application/json", responseSchema: jsonSchema };
                } else if (provider === 'anthropic') {
                    url = "[https://api.anthropic.com/v1/messages](https://api.anthropic.com/v1/messages)";
                    headers = { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" };
                    let customPrompt = prompt;
                    if (isJson) customPrompt += "\nResponde exclusivamente con un JSON válido estructurado como se solicitó. No agregues formatos markdown de bloque.";
                    bodyPayload = { model: model, max_tokens: 3500, messages: [{ role: "user", content: customPrompt }] };
                    if (systemPrompt) bodyPayload.system = systemPrompt;
                } else if (provider === 'openai') {
                    url = "[https://api.openai.com/v1/chat/completions](https://api.openai.com/v1/chat/completions)";
                    headers = { "Content-Type": "application/json", "Authorization": `Bearer ${key}` };
                    const messages = systemPrompt ? [{ role: "system", content: systemPrompt }] : [];
                    let customPrompt = prompt;
                    if (isJson) customPrompt += "\nResponde únicamente con un objeto JSON válido.";
                    messages.push({ role: "user", content: customPrompt });
                    bodyPayload = { model: model, messages: messages };
                    if (isJson) bodyPayload.response_format = { type: "json_object" };
                } else if (provider === 'openrouter') {
                    url = "[https://openrouter.ai/api/v1/chat/completions](https://openrouter.ai/api/v1/chat/completions)";
                    headers = { "Content-Type": "application/json", "Authorization": `Bearer ${key}`, "HTTP-Referer": window.location.origin, "X-Title": "ConciliaMax ERP" };
                    const messages = systemPrompt ? [{ role: "system", content: systemPrompt }] : [];
                    let customPrompt = prompt;
                    if (isJson) customPrompt += "\nResponde únicamente con un objeto JSON válido.";
                    messages.push({ role: "user", content: customPrompt });
                    bodyPayload = { model: model, messages: messages };
                }

                for (let i = 0; i < 3; i++) {
                    try {
                        const response = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(bodyPayload) });
                        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                        const result = await response.json();
                        if (provider === 'google') return result.candidates?.[0]?.content?.parts?.[0]?.text;
                        else if (provider === 'anthropic') return result.content?.[0]?.text;
                        else if (provider === 'openai' || provider === 'openrouter') return result.choices?.[0]?.message?.content;
                    } catch (err) {
                        if (i === 2) throw err;
                        await new Promise(resolve => setTimeout(resolve, [1000, 2000, 4000][i]));
                    }
                }
            };

            const handleTestConnection = async () => {
                if (!apiKey) return triggerToast('Introduce primero una API Key.');
                setTestingConnection(true);
                try {
                    const res = await callAiAPI("Responde únicamente 'CONECTADO'.", "Diagnóstico.");
                    if (res && res.toUpperCase().includes('CONECTADO')) triggerToast('✅ Conexión establecida de forma exitosa.');
                    else triggerToast('⚠️ Conexión fallida: ' + res);
                } catch (err) { triggerToast('❌ Error: ' + err.message); } 
                finally { setTestingConnection(false); }
            };

            // --- CARGA DE ARCHIVOS EN MEMORIA ---
            const handleLocalXmlUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                let parsed = [], errs = 0;
                
                for (let file of files) {
                    if (file.name.endsWith('.zip')) {
                        try {
                            const zip = await new JSZip().loadAsync(file);
                            for (let [path, zipEntry] of Object.entries(zip.files)) {
                                if (path.toLowerCase().endsWith('.xml') && !zipEntry.dir) {
                                    try { parsed.push(parseSingleXmlText(await zipEntry.async("string"), path, activeCompany.rfc)); } 
                                    catch(e) { errs++; }
                                }
                            }
                        } catch(e) { errs++; }
                    } else if (file.name.toLowerCase().endsWith('.xml')) {
                        try { parsed.push(parseSingleXmlText(await file.text(), file.name, activeCompany.rfc)); } 
                        catch(e) { errs++; }
                    }
                }
                
                if (parsed.length) {
                    setCfdis(prev => {
                        const existing = new Set(prev.map(c => c.uuid));
                        return [...prev, ...parsed.filter(c => !existing.has(c.uuid))];
                    });
                    setXmlSubTab('listado');
                    triggerToast(`Se agregaron ${parsed.length} XMLs. ${errs>0?`(${errs} errores)`:''}`);
                }
            };

            const handleBankUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                // En un caso real aquí leeríamos el CSV. Simulamos con datos consistentes.
                const DEMO_BANK_MOVEMENTS = [
                    { id: 1, fecha: '2025-12-04', referencia: 'ARRENDAMIENTO ASIA', descripcion: 'PAGO ASIA', cargo: 0, abono: 3340.96, tipo: 'Ingreso' },
                    { id: 2, fecha: '2025-12-09', referencia: 'PROEPTA', descripcion: 'MANTENIMIENTO', cargo: 180.09, abono: 0, tipo: 'Egreso' },
                    { id: 3, fecha: '2025-12-18', referencia: 'WALMART MX', descripcion: 'COMPRA PAPELERIA', cargo: 332.48, abono: 0, tipo: 'Egreso' },
                    { id: 4, fecha: '2025-12-16', referencia: 'RILE CUERNAVACA', descripcion: 'SPEI RECIBIDO', cargo: 0, abono: 16851.74, tipo: 'Ingreso' }
                ];
                setBankMovements(DEMO_BANK_MOVEMENTS);
                triggerToast('📁 Estado de cuenta bancario cargado en sesión.');
            };

            const handleCatalogUpload = (e) => {
                if (!e.target.files[0]) return;
                setAccounts(DEFAULT_ACCOUNTS);
                triggerToast('📁 Catálogo de cuentas importado.');
            };

            // --- CONCILIACIÓN E INTELIGENCIA ARTIFICIAL ---
            const triggerSmartMatch = () => {
                if (!bankMovements.length || !cfdis.length) return triggerToast('Faltan datos de banco o XMLs.');
                const newMatches = { ...matches };
                let matchCount = 0;

                bankMovements.forEach(movement => {
                    if (newMatches[movement.id]) return;
                    const amount = movement.cargo > 0 ? movement.cargo : movement.abono;
                    const type = movement.cargo > 0 ? 'Recibido' : 'Emitido';

                    const potentialXml = cfdis.find(cfdi => {
                        const sameType = cfdi.tipo === type;
                        const sameAmount = Math.abs(cfdi.total - amount) < 0.05;
                        const free = !Object.values(newMatches).includes(cfdi.uuid);
                        if (sameType && sameAmount && free) {
                            const descrMatches = movement.descripcion.includes(cfdi.nombreEmisor.split(' ')[0]) || movement.referencia.includes(cfdi.rfcEmisor.substring(0,4));
                            return descrMatches || true; // Simplificado para demo
                        }
                        return false;
                    });
                    if (potentialXml) { newMatches[movement.id] = potentialXml.uuid; matchCount++; }
                });
                setMatches(newMatches);
                triggerToast(`✅ Conciliación inteligente: ${matchCount} vínculos creados.`);
            };

            const handleAskAiForMovement = async (mov) => {
                setLoadingAiSug(prev => ({ ...prev, [mov.id]: true }));
                const amount = mov.cargo > 0 ? mov.cargo : mov.abono;
                const sysPrompt = "Actúas como un Contador Público Certificado experto en NIF. Sugiere la mejor cuenta contable.";
                const userPrompt = `Analiza la transacción: ${mov.fecha} - ${mov.referencia} - ${mov.descripcion} - $${amount.toFixed(2)}. Catálogo: ${JSON.stringify(accounts.map(a=>a.codigo+"|"+a.nombre))}. Retorna JSON con: codigoSugerido, nombreSugerido, justificacion, confianza (int 1-100).`;
                const schema = { type: "OBJECT", properties: { codigoSugerido: { type: "STRING" }, nombreSugerido: { type: "STRING" }, justificacion: { type: "STRING" }, confianza: { type: "INTEGER" } }, required: ["codigoSugerido", "nombreSugerido", "justificacion", "confianza"] };
                
                try {
                    const resText = await callAiAPI(userPrompt, sysPrompt, true, schema);
                    const parsed = safeParseJSON(resText);
                    setAiSuggestions(prev => ({ ...prev, [mov.id]: parsed }));
                    triggerToast(`✨ Sugerencia contable generada.`);
                } catch (err) { triggerToast('Error IA. Revisa tu API Key.'); } 
                finally { setLoadingAiSug(prev => ({ ...prev, [mov.id]: false })); }
            };

            const handleGenerateFiscalReport = async () => {
                setLoadingAiReport(true);
                const sysPrompt = "Eres un Auditor Superior de Hacienda (SAT) de México. Reporte profesional markdown.";
                const userPrompt = `Genera un reporte de salud fiscal para RFC: ${activeCompany.rfc}. Ingresos Banco: $${dashboardStats.totalBancosIngreso}, Egresos Banco: $${dashboardStats.totalBancosEgreso}. Facturación Emitida: $${dashboardStats.totalCfdisEmitidos}, Facturación Recibida: $${dashboardStats.totalCfdisRecibidos}. Evalúa discrepancias e IVA.`;
                try {
                    const report = await callAiAPI(userPrompt, sysPrompt);
                    setAiReport(report);
                    triggerToast('✨ Diagnóstico fiscal completado.');
                } catch (err) { triggerToast('Error IA Auditoría.'); } 
                finally { setLoadingAiReport(false); }
            };

            const handleSendChatMessage = async (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;
                const userText = chatInput;
                setChatMessages(prev => [...prev, { sender: 'user', text: userText }]);
                setChatInput("");
                setLoadingChat(true);

                const sysPrompt = "Eres experto asesor contable y fiscal corporativo en México (LISR, LIVA).";
                const prompt = `RFC: ${activeCompany.rfc}. Pregunta: "${userText}"`;
                try {
                    const aiResponse = await callAiAPI(prompt, sysPrompt);
                    setChatMessages(prev => [...prev, { sender: 'ia', text: aiResponse }]);
                } catch (err) { setChatMessages(prev => [...prev, { sender: 'ia', text: 'Error procesando tu consulta.' }]); } 
                finally { setLoadingChat(false); }
            };

            // --- EXPORTACIONES Y CALCULOS ---
            const dashboardStats = useMemo(() => {
                const totalMovements = bankMovements.length;
                const totalMatched = Object.keys(matches).length;
                return {
                    totalMovements, totalMatched,
                    conciliationRate: totalMovements > 0 ? Math.round((totalMatched / totalMovements) * 100) : 0,
                    totalBancosIngreso: bankMovements.reduce((sum, item) => sum + (item.abono || 0), 0),
                    totalBancosEgreso: bankMovements.reduce((sum, item) => sum + (item.cargo || 0), 0),
                    totalCfdisEmitidos: cfdis.filter(c => c.tipo === 'Emitido').reduce((sum, item) => sum + item.total, 0),
                    totalCfdisRecibidos: cfdis.filter(c => c.tipo === 'Recibido').reduce((sum, item) => sum + item.total, 0),
                    totalCfdisNomina: cfdis.filter(c => c.tipo === 'Nómina').reduce((sum, item) => sum + item.total, 0)
                };
            }, [bankMovements, cfdis, matches]);

            const generatedPolizas = useMemo(() => {
                const polizas = [];
                let counter = { 'Ingreso': startingFolio, 'Egreso': startingFolio, 'Diario': startingFolio };
                const ctaIvaAc = '118-01-001', ctaIvaTr = '213-01-001';

                bankMovements.forEach((mov) => {
                    const matchedUuid = matches[mov.id];
                    const cfdi = matchedUuid ? cfdis.find(c => c.uuid === matchedUuid) : null;
                    const amount = mov.cargo > 0 ? mov.cargo : mov.abono;
                    const tipoPoliza = policyTypeMode === 'auto' ? (mov.abono > 0 ? 'Ingreso' : 'Egreso') : 'Diario';
                    const concepto = cfdi ? `Pago F. ${cfdi.uuid.substring(0,8)} - ${cfdi.tipo === 'Recibido' ? cfdi.nombreEmisor : cfdi.nombreReceptor}` : mov.descripcion;
                    const entries = [];

                    if (mov.cargo > 0) { // Egreso
                        let ctaCargo = cfdi && gastosMeta[cfdi.uuid]?.ctaContable ? gastosMeta[cfdi.uuid].ctaContable : '601-01-001';
                        let nombreCargo = accounts.find(a => a.codigo === ctaCargo)?.nombre || 'Gasto General';
                        const subtotal = cfdi ? cfdi.subtotal : (amount / 1.16);
                        const iva = cfdi ? cfdi.iva : (amount - subtotal);
                        entries.push({ cuenta: ctaCargo, nombre: nombreCargo, cargo: subtotal, abono: 0, rfc: cfdi ? cfdi.rfcEmisor : '' });
                        entries.push({ cuenta: ctaIvaAc, nombre: 'IVA Acreditable Pagado', cargo: iva, abono: 0, rfc: cfdi ? cfdi.rfcEmisor : '' });
                        entries.push({ cuenta: bankAccountCode, nombre: 'Bancos Nacionales', cargo: 0, abono: amount, rfc: '' });
                    } else { // Ingreso
                        let ctaAbono = '401-01-001'; 
                        const subtotal = cfdi ? cfdi.subtotal : (amount / 1.16);
                        const iva = cfdi ? cfdi.iva : (amount - subtotal);
                        entries.push({ cuenta: bankAccountCode, nombre: 'Bancos Nacionales', cargo: amount, abono: 0, rfc: '' });
                        entries.push({ cuenta: ctaAbono, nombre: 'Ingresos', cargo: 0, abono: subtotal, rfc: cfdi ? cfdi.rfcReceptor : '' });
                        entries.push({ cuenta: ctaIvaTr, nombre: 'IVA Trasladado', cargo: 0, abono: iva, rfc: cfdi ? cfdi.rfcReceptor : '' });
                    }
                    polizas.push({ id: mov.id, fecha: mov.fecha, tipo: tipoPoliza, numero: counter[tipoPoliza]++, concepto, movimientos: entries, uuidAsociado: cfdi ? cfdi.uuid : 'SIN_XML' });
                });
                return polizas;
            }, [bankMovements, matches, cfdis, bankAccountCode, accounts, startingFolio, policyTypeMode, gastosMeta]);

            const exportToExcelGastos = () => {
                if (!window.XLSX) return triggerToast('Error: Biblioteca XLSX no cargada.');
                const recibidos = cfdis.filter(c => c.tipo === 'Recibido');
                const data = recibidos.map(c => {
                    const meta = gastosMeta[c.uuid] || {};
                    // Find bank reference if matched
                    const matchId = Object.keys(matches).find(k => matches[k] === c.uuid);
                    const bankRef = matchId ? bankMovements.find(m => m.id == matchId)?.referencia : 'No Conciliado';

                    return {
                        'Fecha Egreso': c.fecha,
                        'Razon Social': c.nombreEmisor,
                        'RFC': c.rfcEmisor,
                        'Factura (UUID)': c.uuid,
                        'Base 16 (Subtotal)': c.subtotal,
                        'IVA': c.iva,
                        'Total': c.total,
                        'Referencia Banco': bankRef,
                        'Descripcion': meta.descripcion || c.concepto || '',
                        'CTA CONTABLE': meta.ctaContable || '',
                        'Etiqueta Gasto': meta.etiqueta || ''
                    };
                });
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Control_Gastos");
                XLSX.writeFile(wb, `Control_Gastos_${activeCompany.rfc}_${new Date().toISOString().split('T')[0]}.xlsx`);
                triggerToast('📊 Archivo de Control de Gastos exportado fielmente.');
            };

            const exportToExcelConsolidated = () => {
                if (!window.XLSX) return triggerToast('⚠️ Error: Biblioteca Excel XLSX no localizada.');
                const wb = XLSX.utils.book_new();
                
                ['Emitido', 'Recibido', 'Nómina', 'Pago'].forEach(tipoStr => {
                    const sheetData = cfdis.filter(c => c.tipo === tipoStr).map(c => ({
                        'XML': `${c.uuid.substring(0, 8)}.xml`,
                        'Rfc Emisor': c.rfcEmisor, 'Nombre Emisor': c.nombreEmisor,
                        'Rfc Receptor': c.rfcReceptor, 'Nombre Receptor': c.nombreReceptor,
                        'Fecha': c.fecha, 'Sub Total': c.subtotal, 'IVA': c.iva, 'Total': c.total,
                        'UUID': c.uuid, 'Conceptos': c.concepto
                    }));
                    if(sheetData.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheetData), tipoStr);
                });
                if(wb.SheetNames.length === 0) return triggerToast('No hay datos para exportar.');
                XLSX.writeFile(wb, `Reporte_XMLs_${activeCompany.rfc}.xlsx`);
                triggerToast('📊 Reporte Consolidado exportado.');
            };

            const downloadContpaqiPolizas = () => {
                let txtContent = "";
                generatedPolizas.forEach(p => {
                    const tipoNum = p.tipo === 'Ingreso' ? '1' : p.tipo === 'Egreso' ? '2' : '3';
                    const cleanConcepto = p.concepto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").substring(0, 99);
                    txtContent += `P  ${p.fecha.replace(/-/g, '')}   ${tipoNum}        ${p.numero} 0 0.00 ${cleanConcepto}\n`;
                    p.movimientos.forEach(m => {
                        const amount = m.cargo > 0 ? m.cargo : m.abono;
                        txtContent += `M  ${m.cuenta.replace(/-/g, '').padEnd(20, ' ')} ${p.uuidAsociado.substring(0,8).padEnd(10, ' ')} ${m.cargo > 0 ? '0' : '1'} ${amount.toFixed(2).padStart(15, ' ')} 0.00 ${cleanConcepto} ${p.uuidAsociado.padEnd(36, ' ')}\n`;
                    });
                });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([txtContent], { type: 'text/plain;charset=utf-8' }));
                link.download = `Polizas_CONTPAQI_${activeCompany.rfc}.txt`;
                link.click(); triggerToast('Descargado TXT para CONTPAQi.');
            };

            return (
                <div className="flex-1 flex flex-col h-screen overflow-hidden">
                    {/* --- HEADER MULTIEMPRESA --- */}
                    <header className="bg-slate-900 text-white shrink-0 z-40 shadow-md">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-500 text-slate-950 p-2 rounded-lg font-bold shadow-lg shadow-emerald-500/20">
                                    <i data-lucide="calculator" className="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight flex items-center gap-2">
                                        ConciliaMax
                                        {user && db ? <span className="bg-indigo-500 text-white text-[10px] px-1.5 py-0.5 rounded uppercase tracking-wider font-bold">Cloud Sync</span> : <span className="bg-emerald-500 text-slate-950 text-[10px] px-1.5 py-0.5 rounded uppercase tracking-wider font-bold border border-emerald-400">Local Only</span>}
                                    </h1>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4 text-sm font-sans">
                                <div className="flex flex-col items-end">
                                    <span className="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Empresa Activa (RFC)</span>
                                    <select 
                                        className="bg-slate-800 text-white border border-slate-700 rounded px-2 py-1 outline-none text-xs font-bold max-w-[200px] sm:max-w-xs truncate cursor-pointer hover:bg-slate-700 transition-colors"
                                        value={activeCompanyId}
                                        onChange={(e) => {
                                            setActiveCompanyId(e.target.value);
                                            setCfdis([]); setBankMovements([]); setMatches([]); // Limpiar memoria por seguridad
                                            triggerToast('Cambiando contexto a empresa seleccionada.');
                                        }}
                                    >
                                        {companies.map(c => <option key={c.id} value={c.id}>{c.rfc} - {c.razonSocial}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* --- BARRA DE NAVEGACIÓN --- */}
                    <nav className="bg-white border-b border-slate-200 shrink-0 shadow-sm font-sans">
                        <div className="max-w-7xl mx-auto px-4 flex space-x-1 overflow-x-auto no-scrollbar">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'Resumen' },
                                { id: 'sat', icon: 'folder-open', label: 'Importar XML', badge: cfdis.length },
                                { id: 'gastos', icon: 'clipboard-list', label: 'Control Gastos', color: 'border-amber-500 text-amber-600 bg-amber-50 rounded-t-md' },
                                { id: 'bancos', icon: 'landmark', label: 'Bancos', badge: bankMovements.length },
                                { id: 'conciliacion', icon: 'git-compare', label: 'Conciliación', badge: Object.keys(matches).length },
                                { id: 'polizas', icon: 'file-spreadsheet', label: 'Pólizas' },
                                { id: 'catalogo', icon: 'book-open', label: 'Catálogo' },
                                { id: 'consultor-ia', icon: 'bot', label: 'Consultor IA', color: 'border-indigo-500 text-indigo-600' },
                                { id: 'configuracion', icon: 'settings', label: 'Configuración', color: 'border-slate-800 text-slate-800' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                                    className={`py-3 px-3.5 border-b-[3px] font-bold text-xs flex items-center gap-1.5 whitespace-nowrap transition-colors 
                                    ${activeTab === tab.id ? (tab.color || 'border-emerald-500 text-emerald-600') : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}>
                                    <i data-lucide={tab.icon} className="w-4 h-4"></i> {tab.label}
                                    {tab.badge > 0 && <span className="ml-1 bg-slate-200 text-slate-700 px-1.5 rounded-full text-[10px]">{tab.badge}</span>}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* --- TOAST --- */}
                    {toast && (
                        <div className="fixed bottom-5 right-5 z-50 bg-slate-900 border border-slate-700 text-white rounded-xl shadow-2xl p-4 text-xs font-bold flex items-center gap-2 animate-bounce">
                            <i data-lucide="check-circle" className="text-emerald-400 w-5 h-5 shrink-0"></i> {toast}
                        </div>
                    )}

                    {/* --- MAIN CONTENT AREA --- */}
                    <main className="flex-1 overflow-y-auto bg-slate-50/50 p-4 sm:p-6 font-sans">
                        <div className="max-w-7xl mx-auto space-y-6">

                            {/* TAB: DASHBOARD */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="bg-gradient-to-r from-slate-900 to-slate-800 rounded-xl p-6 text-white shadow-lg flex flex-col md:flex-row justify-between items-center gap-4 border border-slate-700">
                                        <div>
                                            <h2 className="text-2xl font-bold">Automatización Fiscal para {activeCompany.razonSocial}</h2>
                                            <p className="text-slate-300 text-sm mt-1 max-w-2xl font-sans">
                                                Concilia facturas del SAT contra bancos masivamente. Entorno multiempresa activado.
                                            </p>
                                        </div>
                                        <div className="flex gap-2 flex-wrap">
                                            {cfdis.length === 0 && (
                                                <button onClick={() => {
                                                    const demoData = [
                                                        { uuid: '04E7659C', fecha: '2025-12-16', rfcEmisor: activeCompany.rfc, nombreEmisor: activeCompany.razonSocial, rfcReceptor: 'RCU150707', nombreReceptor: 'CLIENTE SA', total: 16851.74, subtotal: 14527.36, iva: 2324.38, tipo: 'Emitido', concepto: 'Servicios', status: 'Vigente' },
                                                        { uuid: '0038C0FC', fecha: '2025-12-18', rfcEmisor: 'NWM9709244W4', nombreEmisor: 'NUEVA WAL MART', rfcReceptor: activeCompany.rfc, nombreReceptor: activeCompany.razonSocial, total: 332.48, subtotal: 286.62, iva: 45.86, tipo: 'Recibido', concepto: 'Papelería', status: 'Vigente' }
                                                    ];
                                                    setCfdis(demoData);
                                                    setBankMovements([
                                                        { id: 1, fecha: '2025-12-18', referencia: 'COMPRA WALMART', descripcion: 'TC', cargo: 332.48, abono: 0, tipo: 'Egreso' },
                                                        { id: 2, fecha: '2025-12-16', referencia: 'SPEI RECIBIDO', descripcion: 'CLIENTE', cargo: 0, abono: 16851.74, tipo: 'Ingreso' }
                                                    ]);
                                                    triggerToast('Datos demo cargados.');
                                                }} className="bg-amber-500 hover:bg-amber-600 text-slate-950 px-4 py-2 rounded-lg font-bold text-xs transition-all shadow-lg">
                                                    Cargar Demo
                                                </button>
                                            )}
                                            <button onClick={triggerSmartMatch} className="bg-emerald-500 hover:bg-emerald-600 text-slate-950 px-4 py-2 rounded-lg font-bold text-xs transition-all shadow-lg flex items-center gap-2">
                                                <i data-lucide="sparkles" className="w-4 h-4"></i> Conciliar Inteligente
                                            </button>
                                            <button onClick={exportToExcelConsolidated} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold text-xs transition-all shadow-lg flex items-center gap-2">
                                                <i data-lucide="download" className="w-4 h-4"></i> Exportar Todo
                                            </button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 font-sans">
                                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm text-center">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Tasa de Conciliación</div>
                                            <div className="text-3xl font-mono font-bold mt-2">{dashboardStats.conciliationRate}%</div>
                                            <div className="w-full bg-slate-100 rounded-full h-1.5 mt-3"><div className="bg-emerald-500 h-1.5 rounded-full" style={{ width: `${dashboardStats.conciliationRate}%` }}></div></div>
                                        </div>
                                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm text-center">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Ingresos (Emitidos)</div>
                                            <div className="text-2xl font-mono font-bold mt-2 text-emerald-600">${dashboardStats.totalCfdisEmitidos.toLocaleString('es-MX')}</div>
                                        </div>
                                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm text-center">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Gastos (Recibidos)</div>
                                            <div className="text-2xl font-mono font-bold mt-2 text-amber-600">${dashboardStats.totalCfdisRecibidos.toLocaleString('es-MX')}</div>
                                        </div>
                                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm text-center">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Bancos (Egreso)</div>
                                            <div className="text-2xl font-mono font-bold mt-2 text-indigo-600">${dashboardStats.totalBancosEgreso.toLocaleString('es-MX')}</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: IMPORTAR XML */}
                            {activeTab === 'sat' && (
                                <div className="space-y-6">
                                    <div className="flex border-b border-slate-200 overflow-x-auto font-sans">
                                        <button onClick={() => setXmlSubTab('carga')} className={`py-2 px-4 font-bold text-xs flex gap-2 border-b-2 whitespace-nowrap ${xmlSubTab === 'carga' ? 'border-emerald-600 text-emerald-600' : 'border-transparent text-slate-500'}`}>Cargar XML/ZIP</button>
                                        <button onClick={() => setXmlSubTab('listado')} className={`py-2 px-4 font-bold text-xs flex gap-2 border-b-2 whitespace-nowrap ${xmlSubTab === 'listado' ? 'border-emerald-600 text-emerald-600' : 'border-transparent text-slate-500'}`}>Listado ({cfdis.length})</button>
                                    </div>

                                    {xmlSubTab === 'carga' && (
                                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm text-center">
                                            <h3 className="text-lg font-bold mb-2">Importación XML Local (Sin Nube)</h3>
                                            <p className="text-xs text-slate-500 mb-6">Arrastra archivos XML o ZIP. Todo se procesa rápido en la RAM de tu PC.</p>
                                            <div className="border-2 border-dashed border-emerald-300 rounded-xl p-10 bg-emerald-50 hover:bg-emerald-100 transition-colors relative cursor-pointer max-w-lg mx-auto">
                                                <input type="file" accept=".xml,.zip" multiple onChange={handleLocalXmlUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                <i data-lucide="files" className="w-12 h-12 text-emerald-500 mx-auto mb-3"></i>
                                                <span className="font-bold text-slate-700 block text-sm">Clic o arrastra archivos aquí</span>
                                            </div>
                                        </div>
                                    )}

                                    {xmlSubTab === 'listado' && (
                                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                            <div className="flex justify-between mb-4">
                                                <h3 className="font-bold text-sm">Comprobantes Importados</h3>
                                                <select value={cfdiTypeFilter} onChange={e => setCfdiTypeFilter(e.target.value)} className="border rounded px-2 text-xs py-1">
                                                    {['Todos', 'Emitido', 'Recibido', 'Nómina', 'Pago'].map(o => <option key={o} value={o}>{o}</option>)}
                                                </select>
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left text-xs font-mono whitespace-nowrap">
                                                    <thead className="border-b text-slate-400 font-sans">
                                                        <tr><th className="py-2">Fecha</th><th>Tipo</th><th>RFC Emisor</th><th>Emisor</th><th className="text-right">Total</th><th>UUID</th></tr>
                                                    </thead>
                                                    <tbody>
                                                        {cfdis.filter(c => cfdiTypeFilter === 'Todos' || c.tipo === cfdiTypeFilter).map(c => (
                                                            <tr key={c.uuid} className="border-b border-slate-50 hover:bg-slate-50">
                                                                <td className="py-2">{c.fecha}</td>
                                                                <td><span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${c.tipo === 'Recibido'?'bg-amber-100 text-amber-800':'bg-emerald-100 text-emerald-800'}`}>{c.tipo}</span></td>
                                                                <td>{c.rfcEmisor}</td>
                                                                <td className="truncate max-w-[150px] font-sans">{c.nombreEmisor}</td>
                                                                <td className="text-right font-bold">${c.total.toFixed(2)}</td>
                                                                <td className="text-slate-400">{c.uuid.substring(0,8)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* NUEVA PESTAÑA: CONTROL DE GASTOS */}
                            {activeTab === 'gastos' && (
                                <div className="space-y-4 animate-fade-in">
                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 border-l-amber-500">
                                        <div>
                                            <h3 className="font-bold text-lg text-amber-700 flex items-center gap-2"><i data-lucide="clipboard-list"></i> Control de Gastos Estructurado</h3>
                                            <p className="text-xs text-slate-500 mt-1">Administra la meta-información de tus Egresos (CFDI Recibidos). Se guarda en tiempo real en la nube asociada a tu empresa.</p>
                                        </div>
                                        <button onClick={exportToExcelGastos} className="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 shadow-sm transition-colors">
                                            <i data-lucide="download" className="w-4 h-4"></i> Exportar Tabla a Excel
                                        </button>
                                    </div>

                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-xs whitespace-nowrap">
                                                <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase tracking-wider text-[10px] font-sans">
                                                    <tr>
                                                        <th className="p-3">Fecha</th>
                                                        <th className="p-3">Proveedor / Emisor</th>
                                                        <th className="p-3">UUID</th>
                                                        <th className="p-3 text-right">Subtotal</th>
                                                        <th className="p-3 text-right">IVA</th>
                                                        <th className="p-3 text-right">Total</th>
                                                        <th className="p-3 text-center text-indigo-600">Match Banco</th>
                                                        <th className="p-3 bg-amber-50 text-amber-800 min-w-[200px]">Descripción Editable</th>
                                                        <th className="p-3 bg-amber-50 text-amber-800 min-w-[150px]">Cuenta Contable</th>
                                                        <th className="p-3 bg-amber-50 text-amber-800 min-w-[150px]">Etiqueta Gasto</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="font-mono">
                                                    {cfdis.filter(c => c.tipo === 'Recibido').map(c => {
                                                        const meta = gastosMeta[c.uuid] || {};
                                                        const matchId = Object.keys(matches).find(k => matches[k] === c.uuid);
                                                        const bankMov = matchId ? bankMovements.find(m => m.id == matchId) : null;
                                                        return <GastoRow key={c.uuid} cfdi={c} meta={meta} onUpdate={updateGastoMeta} bankMovement={bankMov} />;
                                                    })}
                                                    {cfdis.filter(c => c.tipo === 'Recibido').length === 0 && (
                                                        <tr><td colSpan="10" className="p-8 text-center text-slate-400 font-sans italic">No hay facturas de Gastos (Recibidos) importadas en esta sesión.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: BANCOS */}
                            {activeTab === 'bancos' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm text-center">
                                        <h3 className="text-lg font-bold mb-2">Cargar Estado de Cuenta Bancario</h3>
                                        <div className="border-2 border-dashed border-indigo-300 rounded-xl p-8 bg-indigo-50 hover:bg-indigo-100 transition-colors relative cursor-pointer max-w-lg mx-auto">
                                            <input type="file" accept=".csv,.xls,.xlsx" onChange={handleBankUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <i data-lucide="landmark" className="w-10 h-10 text-indigo-500 mx-auto mb-2"></i>
                                            <span className="font-bold text-slate-700 block text-sm">Arrastra tu CSV/Excel bancario</span>
                                        </div>
                                    </div>
                                    {bankMovements.length > 0 && (
                                        <div className="bg-white p-6 rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                                            <h3 className="font-bold text-sm mb-4">Transacciones Bancarias</h3>
                                            <div className="overflow-x-auto text-xs font-mono">
                                                <table className="w-full text-left">
                                                    <thead className="border-b font-sans text-slate-400">
                                                        <tr><th className="py-2">Fecha</th><th>Referencia</th><th>Descripción</th><th className="text-right">Cargo</th><th className="text-right">Abono</th></tr>
                                                    </thead>
                                                    <tbody>
                                                        {bankMovements.map(m => (
                                                            <tr key={m.id} className="border-b border-slate-50 hover:bg-slate-50">
                                                                <td className="py-2">{m.fecha}</td>
                                                                <td className="font-bold">{m.referencia}</td>
                                                                <td className="truncate max-w-[200px]">{m.descripcion}</td>
                                                                <td className="text-right text-rose-600">{m.cargo > 0 ? `-$${m.cargo.toFixed(2)}` : ''}</td>
                                                                <td className="text-right text-emerald-600">{m.abono > 0 ? `+$${m.abono.toFixed(2)}` : ''}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* TAB: CONCILIACIÓN */}
                            {activeTab === 'conciliacion' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                                        <div>
                                            <h3 className="font-bold text-sm">Asistente de Conciliación</h3>
                                            <p className="text-xs text-slate-500 font-sans">Apareamiento Bancos vs XML</p>
                                        </div>
                                        <button onClick={triggerSmartMatch} className="bg-emerald-500 hover:bg-emerald-600 text-slate-950 px-4 py-2 rounded-lg font-bold text-xs">Conciliar Inteligente</button>
                                    </div>
                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
                                        <table className="w-full text-left text-xs font-sans whitespace-nowrap">
                                            <thead className="border-b border-slate-200 text-slate-400 uppercase tracking-wider text-[10px]">
                                                <tr><th className="p-3">Banco</th><th className="p-3 text-right">Importe</th><th className="p-3 text-center">Estatus</th><th className="p-3">CFDI SAT</th><th className="p-3">Cuenta (IA)</th><th className="p-3">Acción</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {bankMovements.map(mov => {
                                                    const matchedUuid = matches[mov.id];
                                                    const cfdi = matchedUuid ? cfdis.find(c => c.uuid === matchedUuid) : null;
                                                    const amount = mov.cargo > 0 ? mov.cargo : mov.abono;
                                                    const isSug = aiSuggestions[mov.id];
                                                    const isSugLoading = loadingAiSug[mov.id];

                                                    return (
                                                        <tr key={mov.id} className="hover:bg-slate-50">
                                                            <td className="p-3">
                                                                <div className="font-bold">{mov.referencia}</div><div className="text-[10px] text-slate-400">{mov.fecha}</div>
                                                            </td>
                                                            <td className="p-3 text-right font-mono font-bold">${amount.toLocaleString()}</td>
                                                            <td className="p-3 text-center"><i data-lucide={matchedUuid ? "link" : "link-2"} className={`w-4 h-4 inline ${matchedUuid ? 'text-emerald-500' : 'text-slate-300'}`}></i></td>
                                                            <td className="p-3">
                                                                {cfdi ? (
                                                                    <div><div className="font-bold text-emerald-800">{cfdi.nombreEmisor}</div><div className="text-[10px] text-slate-400">{cfdi.uuid.substring(0,8)}</div></div>
                                                                ) : (
                                                                    <select onChange={(e) => { setMatches({...matches, [mov.id]: e.target.value}); triggerToast('Vinculado'); }} className="text-[10px] border rounded p-1 max-w-[150px] outline-none">
                                                                        <option value="">Vincular manual...</option>
                                                                        {cfdis.filter(c => !Object.values(matches).includes(c.uuid) && Math.abs(c.total - amount) < 2).map(c => <option key={c.uuid} value={c.uuid}>${c.total} - {c.nombreEmisor}</option>)}
                                                                    </select>
                                                                )}
                                                            </td>
                                                            <td className="p-3">
                                                                {isSug ? (
                                                                    <div className="bg-indigo-50 border border-indigo-200 p-1.5 rounded text-[10px]">
                                                                        <div className="font-bold text-indigo-900">{isSug.codigoSugerido}</div>
                                                                        <button onClick={() => { triggerToast('Cuenta IA Aceptada'); if(cfdi) updateGastoMeta(cfdi.uuid, 'ctaContable', isSug.codigoSugerido); }} className="mt-1 bg-indigo-600 text-white font-bold py-0.5 px-2 rounded w-full">Asignar</button>
                                                                    </div>
                                                                ) : (
                                                                    <button onClick={() => handleAskAiForMovement(mov)} disabled={isSugLoading} className="text-indigo-600 border border-indigo-200 rounded px-2 py-1 text-[10px]">{isSugLoading ? '...' : 'Sugerir IA'}</button>
                                                                )}
                                                            </td>
                                                            <td className="p-3 text-center">
                                                                {matchedUuid && <button onClick={() => {const c={...matches}; delete c[mov.id]; setMatches(c);}} className="text-rose-500"><i data-lucide="x" className="w-4 h-4"></i></button>}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {bankMovements.length === 0 && <tr><td colSpan="6" className="p-8 text-center text-slate-400 italic">No hay bancos.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* TAB: PÓLIZAS */}
                            {activeTab === 'polizas' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row justify-between gap-4">
                                        <div>
                                            <h3 className="font-bold text-lg">Pólizas ERP</h3>
                                            <p className="text-xs text-slate-500">Listas para importar a CONTPAQi / Alegra.</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={downloadContpaqiPolizas} className="bg-slate-900 text-white font-bold py-2 px-4 rounded-lg text-xs">Descargar CONTPAQi</button>
                                        </div>
                                    </div>
                                    <div className="space-y-4 font-mono text-xs">
                                        {generatedPolizas.slice(0, 50).map(p => (
                                            <div key={p.id} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                                                <div className="bg-slate-50 p-4 border-b flex justify-between font-sans">
                                                    <span className="font-bold">Póliza de {p.tipo} #{p.numero} - {p.fecha}</span>
                                                    <span className="text-[10px] text-slate-400">{p.uuidAsociado.substring(0,18)}</span>
                                                </div>
                                                <div className="p-4 overflow-x-auto">
                                                    <table className="w-full text-left">
                                                        <thead className="border-b text-slate-400 text-[10px] font-sans"><tr><th className="py-1">Cuenta</th><th>Nombre</th><th className="text-right">Debe</th><th className="text-right">Haber</th></tr></thead>
                                                        <tbody>
                                                            {p.movimientos.map((m, idx) => (
                                                                <tr key={idx} className="border-b border-slate-50"><td className="py-2 font-bold">{m.cuenta}</td><td className="font-sans">{m.nombre}</td><td className="text-right text-emerald-700">${m.cargo.toFixed(2)}</td><td className="text-right text-rose-700">${m.abono.toFixed(2)}</td></tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: CATÁLOGO */}
                            {activeTab === 'catalogo' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-fit">
                                        <h3 className="font-bold mb-4">Cuentas Contables</h3>
                                        <form onSubmit={(e) => { e.preventDefault(); setAccounts([...accounts, {codigo: e.target.codigo.value, nombre: e.target.nombre.value, tipo: 'Egreso'}]); triggerToast('Agregada'); }} className="space-y-3 text-xs mb-6">
                                            <input name="codigo" placeholder="Código (ej: 601)" className="w-full border rounded p-2 outline-none" required />
                                            <input name="nombre" placeholder="Nombre (ej: Gastos IT)" className="w-full border rounded p-2 outline-none" required />
                                            <button className="bg-slate-900 text-white w-full py-2 rounded font-bold">Agregar Manual</button>
                                        </form>
                                        <div className="border border-dashed p-4 text-center cursor-pointer hover:bg-slate-50 relative">
                                            <input type="file" onChange={handleCatalogUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <span className="text-xs font-bold">Subir CSV de Catálogo</span>
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm max-h-[600px] overflow-y-auto">
                                        <h3 className="font-bold mb-4">Mapeo Activo</h3>
                                        <table className="w-full text-xs text-left font-mono">
                                            <tbody>
                                                {accounts.map(a => (
                                                    <tr key={a.codigo} className="border-b"><td className="py-2 font-bold">{a.codigo}</td><td className="font-sans text-slate-600">{a.nombre}</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* TAB: CONSULTOR IA */}
                            {activeTab === 'consultor-ia' && (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col h-[600px]">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold">Auditoría Fiscal SAT</h3>
                                            <button onClick={handleGenerateFiscalReport} disabled={loadingAiReport} className="bg-slate-900 text-white px-3 py-1.5 rounded text-xs font-bold">{loadingAiReport ? '...' : 'Generar'}</button>
                                        </div>
                                        <div className="flex-1 bg-slate-50 p-4 rounded border text-xs overflow-y-auto whitespace-pre-wrap">{aiReport || 'Ejecuta el diagnóstico...'}</div>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col h-[600px]">
                                        <h3 className="font-bold mb-4">Chat Fiscal Leyes Mexicanas</h3>
                                        <div className="flex-1 overflow-y-auto bg-slate-50 p-4 rounded mb-4 space-y-3">
                                            {chatMessages.map((m, i) => (
                                                <div key={i} className={`flex ${m.sender==='user'?'justify-end':'justify-start'}`}>
                                                    <div className={`p-3 rounded-lg max-w-[85%] text-xs ${m.sender==='user'?'bg-indigo-600 text-white':'bg-white border'}`}>{m.text}</div>
                                                </div>
                                            ))}
                                            {loadingChat && <div className="text-xs text-slate-400">IA escribiendo...</div>}
                                        </div>
                                        <form onSubmit={handleSendChatMessage} className="flex gap-2">
                                            <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} className="flex-1 border rounded p-2 text-xs outline-none" placeholder="Pregunta algo..." />
                                            <button className="bg-indigo-600 text-white px-4 py-2 rounded text-xs font-bold">Enviar</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* TAB: CONFIGURACIÓN MULTIEMPRESA & IA */}
                            {activeTab === 'configuracion' && (
                                <div className="max-w-3xl mx-auto space-y-6 animate-fade-in">
                                    {/* Módulo Multiempresa Nube */}
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-indigo-500">
                                        <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="building-2"></i> Gestión Multiempresa Segura</h3>
                                        <p className="text-xs text-slate-500 mb-6">Administra múltiples perfiles de empresas. Si estás conectado a la nube, se sincronizan entre dispositivos.</p>
                                        
                                        <div className="space-y-3 mb-6 max-h-[250px] overflow-y-auto pr-2">
