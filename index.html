<body class="text-slate-900 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONSTANTES Y DATOS POR DEFECTO ---
        const PROVIDER_MODELS = {
            google: [
                { value: 'gemini-2.5-flash', label: 'gemini-2.5-flash (Balance óptimo)' },
                { value: 'gemini-2.5-pro', label: 'gemini-2.5-pro (Auditorías de alta precisión)' },
                { value: 'gemini-1.5-flash', label: 'gemini-1.5-flash (Velocidad)' }
            ],
            anthropic: [
                { value: 'claude-3-5-sonnet-latest', label: 'claude-3-5-sonnet-latest (Precisión)' },
                { value: 'claude-3-5-haiku-latest', label: 'claude-3-5-haiku-latest (Económico)' }
            ],
            openai: [
                { value: 'gpt-4o', label: 'gpt-4o (Insignia)' },
                { value: 'gpt-4o-mini', label: 'gpt-4o-mini (Rápido)' },
                { value: 'o1-mini', label: 'o1-mini (Razonamiento)' }
            ],
            openrouter: [
                { value: 'google/gemini-2.5-flash', label: 'OR: Google Gemini 2.5 Flash' },
                { value: 'anthropic/claude-3.5-sonnet', label: 'OR: Anthropic Claude 3.5 Sonnet' }
            ]
        };

        // --- FUNCIONES AUXILIARES ---
        const safeParseJSON = (text) => {
            if (!text) return null;
            let clean = text.trim();
            if (clean.startsWith('```json')) clean = clean.substring(7);
            else if (clean.startsWith('```')) clean = clean.substring(3);
            if (clean.endsWith('```')) clean = clean.substring(0, clean.length - 3);
            try { return JSON.parse(clean.trim()); } catch (e) { return null; }
        };

        const getElementByLocalName = (parent, localName) => {
            if (!parent) return null;
            const tags = parent.getElementsByTagName('*');
            for (let i = 0; i < tags.length; i++) {
                const nodeLocalName = tags[i].localName || tags[i].tagName.split(':').pop();
                if (nodeLocalName && nodeLocalName.toLowerCase() === localName.toLowerCase()) return tags[i];
            }
            return null;
        };

        const getAttrIgnoreCase = (element, attrName) => {
            if (!element) return null;
            let val = element.getAttribute(attrName);
            if (val !== null) return val;
            for (let i = 0; i < element.attributes.length; i++) {
                const cleanName = element.attributes[i].name.split(':').pop().toLowerCase();
                if (cleanName === attrName.toLowerCase()) return element.attributes[i].value;
            }
            return null;
        };

        const parseSingleXmlText = (xmlText, fileName, currentRfc) => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            if (xmlDoc.getElementsByTagName("parsererror").length > 0) throw new Error("XML ilegible");

            const comp = getElementByLocalName(xmlDoc, "Comprobante");
            const emisor = getElementByLocalName(xmlDoc, "Emisor");
            const receptor = getElementByLocalName(xmlDoc, "Receptor");
            const timbre = getElementByLocalName(xmlDoc, "TimbreFiscalDigital");
            
            if (!comp) throw new Error("No CFDI");

            const uuid = timbre ? getAttrIgnoreCase(timbre, "UUID") : `LOC-${Math.random().toString(36).substr(2,9)}`;
            const rfcEmisor = (getAttrIgnoreCase(emisor, "Rfc") || "X").toUpperCase();
            const rfcReceptor = (getAttrIgnoreCase(receptor, "Rfc") || "X").toUpperCase();
            
            let tipo = "Recibido";
            const tipoComp = getAttrIgnoreCase(comp, "TipoDeComprobante") || "I";
            if (tipoComp.toUpperCase() === 'N' || getElementByLocalName(xmlDoc, "Nomina")) tipo = "Nómina";
            else if (tipoComp.toUpperCase() === 'P' || getElementByLocalName(xmlDoc, "Pagos")) tipo = "Pago";
            else if (rfcEmisor === currentRfc) tipo = "Emitido";

            const conceptos = Array.from(xmlDoc.getElementsByTagName('*')).filter(t => (t.localName || t.tagName.split(':').pop()).toLowerCase() === 'concepto');
            const conceptoStr = conceptos.map(c => getAttrIgnoreCase(c, "Descripcion")).filter(Boolean).join(", ");

            // Normalización de fecha a YYYY-MM-DD
            let fechaRaw = getAttrIgnoreCase(comp, "Fecha") || new Date().toISOString();
            let fecha = fechaRaw.substring(0, 10);

            const total = parseFloat(getAttrIgnoreCase(comp, "Total") || 0);
            const subtotal = parseFloat(getAttrIgnoreCase(comp, "SubTotal") || 0);

            // Motor robusto de extracción fiscal
            let iva = 0;
            const impuestosNode = getElementByLocalName(xmlDoc, "Impuestos");
            if (impuestosNode) {
                const traslados = getElementByLocalName(impuestosNode, "Traslados");
                if (traslados) {
                    const nodosTraslado = traslados.getElementsByTagName('*');
                    for (let i = 0; i < nodosTraslado.length; i++) {
                        const t = nodosTraslado[i];
                        if ((t.localName || t.tagName.split(':').pop()).toLowerCase() === 'traslado') {
                            if (getAttrIgnoreCase(t, 'Impuesto') === '002') {
                                iva += parseFloat(getAttrIgnoreCase(t, 'Importe') || 0);
                            }
                        }
                    }
                }
            }
            if (iva === 0 && (total - subtotal) > 0.01) { iva = total - subtotal; }

            return {
                uuid,
                fecha,
                rfcEmisor, nombreEmisor: getAttrIgnoreCase(emisor, "Nombre") || "Proveedor",
                rfcReceptor, nombreReceptor: getAttrIgnoreCase(receptor, "Nombre") || "Cliente",
                total,
                subtotal,
                iva,
                tipo,
                concepto: conceptoStr,
                status: 'Vigente'
            };
        };

        // --- COMPONENTE DE TABLA REACTIVO ---
        const GastoRow = ({ cfdi, meta, onUpdate, bankMovement, onGeneratePolicy }) => {
            const [localDesc, setLocalDesc] = useState(meta.descripcion || '');
            const [localCta, setLocalCta] = useState(meta.ctaContable || '');
            const [localEtiq, setLocalEtiq] = useState(meta.etiqueta || '');

            useEffect(() => { setLocalDesc(meta.descripcion || ''); }, [meta.descripcion]);
            useEffect(() => { setLocalCta(meta.ctaContable || ''); }, [meta.ctaContable]);
            useEffect(() => { setLocalEtiq(meta.etiqueta || ''); }, [meta.etiqueta]);

            return (
                <tr className="hover:bg-amber-50/40 transition-colors border-b border-slate-100/70 group">
                    <td className="p-3 text-slate-500">{cfdi.fecha}</td>
                    <td className="p-3 font-sans font-bold text-slate-800 truncate max-w-[180px]" title={cfdi.nombreEmisor}>{cfdi.nombreEmisor}</td>
                    <td className="p-3 text-slate-400 font-mono text-[10px]" title={cfdi.uuid}>{cfdi.uuid.substring(0,8)}</td>
                    <td className="p-3 text-right text-slate-600">${cfdi.subtotal.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-right text-slate-600">${cfdi.iva.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-right font-bold text-slate-900">${cfdi.total.toLocaleString('es-MX', {minimumFractionDigits: 2})}</td>
                    <td className="p-3 text-center">
                        {bankMovement ? 
                            <span className="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full truncate max-w-[120px] inline-block shadow-sm" title={bankMovement.referencia}>
                                <i data-lucide="check-circle" className="w-3 h-3 inline mr-1"></i> {bankMovement.referencia}
                            </span> 
                            : <span className="text-[10px] text-slate-300 font-bold bg-slate-100 px-2 py-1 rounded-full">Sin Match</span>
                        }
                    </td>
                    <td className="p-1.5 bg-amber-50/20 group-hover:bg-amber-50/50 transition-colors">
                        <input type="text" className="w-full bg-white border border-slate-200/60 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-2 ring-amber-100 font-sans shadow-sm transition-all"
                            placeholder={cfdi.concepto.substring(0,25) + '...'} value={localDesc} onChange={e => setLocalDesc(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'descripcion', localDesc)} />
                    </td>
                    <td className="p-1.5 bg-amber-50/20 group-hover:bg-amber-50/50 transition-colors relative">
                        {/* BUSQUEDA INCREMENTAL DE CUENTAS VINCULADA AL DATALIST */}
                        <input type="text" list="cuentas-list" className="w-full bg-white border border-slate-200/60 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-2 ring-amber-100 font-sans uppercase text-[10px] font-bold shadow-sm transition-all text-indigo-700 placeholder-slate-300"
                            placeholder="Buscar cuenta..." value={localCta} onChange={e => setLocalCta(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'ctaContable', localCta)} />
                    </td>
                    <td className="p-1.5 bg-amber-50/20 group-hover:bg-amber-50/50 transition-colors">
                        {/* BUSQUEDA INCREMENTAL DE ETIQUETAS */}
                        <input type="text" list="etiquetas-list" className="w-full bg-white border border-slate-200/60 rounded px-2 py-1.5 outline-none focus:border-amber-400 focus:ring-2 ring-amber-100 font-sans shadow-sm transition-all text-slate-700 font-medium placeholder-slate-300"
                            placeholder="Buscar etiqueta..." value={localEtiq} onChange={e => setLocalEtiq(e.target.value)} onBlur={() => onUpdate(cfdi.uuid, 'etiqueta', localEtiq)} />
                    </td>
                    <td className="p-1.5 text-center bg-amber-50/20 group-hover:bg-amber-50/50 transition-colors">
                        <button onClick={() => onGeneratePolicy(cfdi, bankMovement, meta)} className="bg-white hover:bg-indigo-50 border border-indigo-200 text-indigo-600 p-1.5 rounded text-[10px] font-bold flex items-center gap-1 shadow-sm transition-all w-full justify-center">
                            <i data-lucide="file-check-2" className="w-3 h-3"></i> Póliza
                        </button>
                    </td>
                </tr>
            );
        };

        function App() {
            // --- ESTADOS DE INFRAESTRUCTURA FIREBASE ---
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'conciliamax-master';

            // --- ESTADOS MULTIEMPRESA Y PERIODO GLOBAL ---
            const [companies, setCompanies] = useState([{ id: 'default', rfc: 'SIM100812NP3', razonSocial: 'SIMETRICAL S.A. DE C.V.' }]);
            const [activeCompanyId, setActiveCompanyId] = useState('default');
            const activeCompany = useMemo(() => companies.find(c => c.id === activeCompanyId) || companies[0], [companies, activeCompanyId]);
            
            const [globalMonth, setGlobalMonth] = useState('Todos');
            const [globalYear, setGlobalYear] = useState('Todos');

            // --- ESTADOS DE NAVEGACIÓN ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [xmlSubTab, setXmlSubTab] = useState('carga');
            const [toast, setToast] = useState(null);
            const triggerToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 4000); };

            // --- ESTADOS DE DATOS EN MEMORIA ---
            const [cfdis, setCfdis] = useState([]);
            const [bankMovements, setBankMovements] = useState([]);
            const [matches, setMatches] = useState({});
            const [accounts, setAccounts] = useState([]); 
            const [manualPolicies, setManualPolicies] = useState([]); 

            // --- ESTADOS PERSISTENTES (Control de Gastos Meta) ---
            const [gastosMeta, setGastosMeta] = useState({});

            // --- ESTADOS IA & CONFIGURACIÓN ---
            const [apiProvider, setApiProvider] = useState(() => localStorage.getItem('cm_provider_v3') || 'google');
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('cm_key_v3') || '');
            const [apiModel, setApiModel] = useState(() => localStorage.getItem('cm_model_v3') || 'gemini-2.5-flash');
            const [showApiKey, setShowApiKey] = useState(false);
            const [testingConnection, setTestingConnection] = useState(false);
            
            const [bulkAiLoading, setBulkAiLoading] = useState(false);
            const [aiReport, setAiReport] = useState("");
            const [loadingAiReport, setLoadingAiReport] = useState(false);
            const [dashboardInsight, setDashboardInsight] = useState(null);
            const [loadingInsight, setLoadingInsight] = useState(false);
            const [chatMessages, setChatMessages] = useState([{ sender: 'ia', text: '¡Hola! Soy tu Consultor Fiscal IA. Conozco las leyes vigentes del SAT. ¿En qué te puedo asesorar hoy?' }]);
            const [chatInput, setChatInput] = useState("");
            const [loadingChat, setLoadingChat] = useState(false);

            // --- ESTADOS DE FILTROS LOCALES ---
            const [xmlSearchTerm, setXmlSearchTerm] = useState('');
            const [cfdiTypeFilter, setCfdiTypeFilter] = useState('Todos');
            const [policyListFilter, setPolicyListFilter] = useState('Todos');
            const [startingFolio, setStartingFolio] = useState(1);
            const [policyTypeMode, setPolicyTypeMode] = useState('auto');
            const [bankAccountCode, setBankAccountCode] = useState('102-01-001');
            const [showManualPolicyForm, setShowManualPolicyForm] = useState(false);
            const [newManualPolicy, setNewManualPolicy] = useState({ fecha: new Date().toISOString().split('T')[0], concepto: 'Provisión de Gastos', importe: '', cuentaCargo: '', cuentaAbono: '' });
            
            const fileInputBatchRef = useRef(null);

            // --- ETIQUETAS UNICAS PARA AUTOCOMPLETADO ---
            const uniqueEtiquetas = useMemo(() => {
                const etiqs = new Set();
                Object.values(gastosMeta).forEach(m => { if(m.etiqueta) etiqs.add(m.etiqueta); });
                return Array.from(etiqs);
            }, [gastosMeta]);

            // --- 1. INICIALIZAR FIREBASE Y AUTH ---
            useEffect(() => {
                if (typeof window.firebase === 'undefined' || typeof __firebase_config === 'undefined') return;
                try {
                    const config = JSON.parse(__firebase_config);
                    if (!window.firebase.apps.length) window.firebase.initializeApp(config);
                    const firestore = window.firebase.firestore();
                    setDb(firestore);

                    const auth = window.firebase.auth();
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    };
                    initAuth();

                    const unsub = auth.onAuthStateChanged(u => setUser(u));
                    return () => unsub();
                } catch (e) { console.error("Error Firebase Auth", e); }
            }, []);

            // --- 2. CARGAR EMPRESAS Y METADATA DE GASTOS DESDE FIRESTORE ---
            useEffect(() => {
                if (!user || !db) return;
                
                const compRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('companies');
                const unsubComp = compRef.onSnapshot(snap => {
                    const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (loaded.length > 0) {
                        setCompanies(loaded);
                        if (!loaded.find(c => c.id === activeCompanyId)) setActiveCompanyId(loaded[0].id);
                    }
                }, err => console.error("Error loading companies", err));

                const gastosRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('gastosMeta');
                const unsubGastos = gastosRef.onSnapshot(snap => {
                    const meta = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (data.companyId === activeCompanyId) meta[d.id] = data;
                    });
                    setGastosMeta(meta);
                });

                return () => { unsubComp(); unsubGastos(); };
            }, [user, db, activeCompanyId, appId]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // --- MEMOS DE FILTRADO GLOBAL ---
            const activeCfdis = useMemo(() => {
                return cfdis.filter(c => {
                    if (globalYear !== 'Todos' && !c.fecha.startsWith(globalYear)) return false;
                    if (globalMonth !== 'Todos' && c.fecha.substring(5, 7) !== globalMonth) return false;
                    return true;
                });
            }, [cfdis, globalYear, globalMonth]);

            const activeBankMovements = useMemo(() => {
                return bankMovements.filter(m => {
                    if (globalYear !== 'Todos' && !m.fecha.startsWith(globalYear)) return false;
                    if (globalMonth !== 'Todos' && m.fecha.substring(5, 7) !== globalMonth) return false;
                    return true;
                });
            }, [bankMovements, globalYear, globalMonth]);

            const activeManualPolicies = useMemo(() => {
                return manualPolicies.filter(p => {
                    if (globalYear !== 'Todos' && !p.fecha.startsWith(globalYear)) return false;
                    if (globalMonth !== 'Todos' && p.fecha.substring(5, 7) !== globalMonth) return false;
                    return true;
                });
            }, [manualPolicies, globalYear, globalMonth]);

            const filteredCfdis = useMemo(() => {
                return activeCfdis.filter(c => {
                    if (cfdiTypeFilter === 'Ingreso' && c.tipo !== 'Emitido') return false;
                    if (cfdiTypeFilter === 'Egreso' && c.tipo !== 'Recibido') return false;
                    if (cfdiTypeFilter === 'Diario' && c.tipo !== 'Pago' && c.tipo !== 'Nómina') return false;
                    if (xmlSearchTerm) {
                        const term = xmlSearchTerm.toLowerCase();
                        if (!c.uuid.toLowerCase().includes(term) && !c.nombreEmisor.toLowerCase().includes(term) && !c.rfcEmisor.toLowerCase().includes(term)) return false;
                    }
                    return true;
                });
            }, [activeCfdis, cfdiTypeFilter, xmlSearchTerm]);


            // --- MANEJADORES DE LA NUBE Y ESTADO ---
            const handleAddCompany = async (e) => {
                e.preventDefault();
                const rfc = e.target.rfc.value.toUpperCase();
                const razon = e.target.razon.value;
                if (!rfc || !razon) return;
                if (user && db) {
                    const newRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('companies').doc();
                    await newRef.set({ rfc, razonSocial: razon });
                    triggerToast('🏢 Empresa guardada en Firebase.');
                } else {
                    setCompanies(prev => [...prev, { id: Math.random().toString(36).substr(2,9), rfc, razonSocial: razon }]);
                    triggerToast('🏢 Empresa agregada en memoria.');
                }
                e.target.reset();
            };

            const updateGastoMeta = (uuid, field, value) => {
                setGastosMeta(prev => ({ ...prev, [uuid]: { ...(prev[uuid] || {}), [field]: value, companyId: activeCompanyId } }));
                if (user && db) {
                    db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('gastosMeta').doc(uuid)
                        .set({ [field]: value, companyId: activeCompanyId }, { merge: true }).catch(e => console.error("Sync Err", e));
                }
            };

            const handleSaveConfigAPI = (e) => {
                e.preventDefault();
                localStorage.setItem('cm_provider_v3', apiProvider);
                localStorage.setItem('cm_key_v3', apiKey);
                localStorage.setItem('cm_model_v3', apiModel);
                triggerToast('⚙️ Claves IA actualizadas y encriptadas localmente.');
            };

            // --- MOTOR INTELIGENCIA ARTIFICIAL CORE ---
            const callAiAPI = async (prompt, systemPrompt = null, isJson = false, jsonSchema = null) => {
                const provider = localStorage.getItem('cm_provider_v3') || 'google';
                const key = localStorage.getItem('cm_key_v3') || '';
                const model = localStorage.getItem('cm_model_v3') || 'gemini-2.5-flash';

                if (!key) throw new Error("API Key requerida. Configúrala primero.");

                let url = "", headers = { "Content-Type": "application/json" }, bodyPayload = {};

                if (provider === 'google') {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    bodyPayload = { contents: [{ parts: [{ text: prompt }] }] };
                    if (systemPrompt) bodyPayload.systemInstruction = { parts: [{ text: systemPrompt }] };
                    if (isJson && jsonSchema) bodyPayload.generationConfig = { responseMimeType: "application/json", responseSchema: jsonSchema };
                } else if (provider === 'anthropic') {
                    url = "[https://api.anthropic.com/v1/messages](https://api.anthropic.com/v1/messages)";
                    headers = { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" };
                    let customPrompt = prompt;
                    if (isJson) customPrompt += "\nDevuelve UNICAMENTE un JSON válido. Cero markdown extra.";
                    bodyPayload = { model: model, max_tokens: 4000, messages: [{ role: "user", content: customPrompt }] };
                    if (systemPrompt) bodyPayload.system = systemPrompt;
                } else if (provider === 'openai' || provider === 'openrouter') {
                    url = provider === 'openai' ? "[https://api.openai.com/v1/chat/completions](https://api.openai.com/v1/chat/completions)" : "[https://openrouter.ai/api/v1/chat/completions](https://openrouter.ai/api/v1/chat/completions)";
                    headers = { "Content-Type": "application/json", "Authorization": `Bearer ${key}` };
                    if (provider === 'openrouter') { headers["HTTP-Referer"] = window.location.origin; headers["X-Title"] = "ConciliaMax ERP"; }
                    const messages = systemPrompt ? [{ role: "system", content: systemPrompt }] : [];
                    let customPrompt = prompt;
                    if (isJson) customPrompt += "\nDevuelve UNICAMENTE un JSON válido.";
                    messages.push({ role: "user", content: customPrompt });
                    bodyPayload = { model: model, messages: messages };
                    if (isJson && provider === 'openai') bodyPayload.response_format = { type: "json_object" };
                }

                for (let i = 0; i < 3; i++) {
                    try {
                        const response = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(bodyPayload) });
                        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                        const result = await response.json();
                        if (provider === 'google') return result.candidates?.[0]?.content?.parts?.[0]?.text;
                        else if (provider === 'anthropic') return result.content?.[0]?.text;
                        else return result.choices?.[0]?.message?.content;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        // Parsear como matriz pidiendo explícitamente arrays
                        const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        
                        let headerRowIdx = -1;
                        let colMap = {};
                        
                        // Buscar heurísticamente la fila de encabezados (buscamos 'fecha', 'descripción', 'depósito' / 'abono')
                        for (let i = 0; i < Math.min(data.length, 30); i++) {
                            const row = data[i];
                            if (!row || !row.length) continue;
                            const rowStr = row.map(c => String(c||'').toLowerCase()).join('|');
                            
                            if (rowStr.includes('fecha') && 
                               (rowStr.includes('descripci') || rowStr.includes('concepto')) && 
                               (rowStr.includes('depósito') || rowStr.includes('abono') || rowStr.includes('retiro') || rowStr.includes('cargo'))) {
                                
                                headerRowIdx = i;
                                // Mapear índices
                                row.forEach((colName, idx) => {
                                    const name = String(colName || '').toLowerCase().trim();
                                    if (name.includes('fecha')) colMap.fecha = idx;
                                    if (name.includes('descripci') || name.includes('concepto')) colMap.descripcion = idx;
                                    if (name.includes('depósito') || name.includes('abono')) colMap.abono = idx;
                                    if (name.includes('retiro') || name.includes('cargo')) colMap.cargo = idx;
                                    if (name.includes('referencia')) colMap.referencia = idx;
                                });
                                break;
                            }
                        }

                        if(colMap.referencia === undefined) colMap.referencia = -1;

                        let idCounter = bankMovements.length + 1;
                        const parsedMovements = [];
                        let lastMovement = null;

                        if (headerRowIdx !== -1) {
                            for (let i = headerRowIdx + 1; i < data.length; i++) {
                                const row = data[i];
                                if (!row || !row.length) continue;

                                let fechaRaw = row[colMap.fecha];
                                let desc = String(row[colMap.descripcion] || '').trim();
                                
                                const cleanAmount = (val) => {
                                    if(typeof val === 'number') return val;
                                    if(!val || val === '-') return 0;
                                    const clean = String(val).replace(/[$,\s]/g, '');
                                    const num = parseFloat(clean);
                                    return isNaN(num) ? 0 : num;
                                };

                                let abono = cleanAmount(row[colMap.abono]);
                                let cargo = cleanAmount(row[colMap.cargo]);

                                // Detección de filas de continuación (típico de Banamex/Santander)
                                if (!fechaRaw && abono === 0 && cargo === 0 && desc) {
                                    if (lastMovement) {
                                        lastMovement.descripcion += " | " + desc;
                                        // Extraer referencia oculta en el texto si existe
                                        const refMatch = desc.match(/(?:referencia num[é|e]rica:\s*)([a-z0-9\s]+)/i);
                                        if(refMatch) lastMovement.referencia = refMatch[1].trim();
                                    }
                                    continue;
                                }

                                if (abono > 0 || cargo > 0) {
                                    let fechaLimpia = new Date().toISOString().split('T')[0];
                                    if (typeof fechaRaw === 'number') { 
                                        fechaLimpia = new Date(Math.round((fechaRaw - 25569)*86400*1000)).toISOString().split('T')[0];
                                    } else if (typeof fechaRaw === 'string') {
                                        const parts = fechaRaw.split(/[\/\-]/);
                                        if (parts.length === 3) {
                                            if (parts[0].length === 4) fechaLimpia = `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
                                            else fechaLimpia = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                                        } else {
                                            fechaLimpia = fechaRaw.substring(0,10);
                                        }
                                    }

                                    let ref = (colMap.referencia !== -1 && row[colMap.referencia]) ? String(row[colMap.referencia]).trim() : '';
                                    if(!ref) {
                                        const refMatch = desc.match(/(?:referencia num[é|e]rica:\s*|ref:\s*)([a-z0-9\s]+)/i);
                                        if(refMatch) ref = refMatch[1].trim();
                                        else ref = `REF-${idCounter}`;
                                    }

                                    lastMovement = { id: idCounter++, fecha: fechaLimpia, referencia: ref.substring(0, 30), descripcion: desc, cargo, abono, tipo: cargo > 0 ? 'Egreso' : 'Ingreso' };
                                    parsedMovements.push(lastMovement);
                                }
                            }

                            if (parsedMovements.length > 0) {
                                setBankMovements(prev => [...prev, ...parsedMovements]);
                                triggerToast(`🏦 ${parsedMovements.length} movimientos bancarios importados al sistema.`);
                            } else {
                                triggerToast('⚠️ No se detectaron movimientos en el formato extraído.');
                            }

                        } else {
                            triggerToast('❌ Error: El sistema no detectó las columnas estándar (Fecha, Descripción, Depósito, Retiro). Verifica el formato.');
                        }
                    } catch (error) { triggerToast('❌ Error leyendo extracto: ' + error.message); }
                };
                reader.readAsBinaryString(file);
                e.target.value = null;
            };

                        const iva = cfdi ? cfdi.iva : (amount - subtotal);
                        entries.push({ cuenta: ctaCargo, nombre: nombreCargo, cargo: subtotal, abono: 0, rfc: cfdi ? cfdi.rfcEmisor : '' });
                        entries.push({ cuenta: ctaIvaAc, nombre: 'IVA Acreditable Pagado', cargo: iva, abono: 0, rfc: cfdi ? cfdi.rfcEmisor : '' });
                        entries.push({ cuenta: bankAccountCode, nombre: 'Bancos Nacionales', cargo: 0, abono: amount, rfc: '' });
                    } else { // Ingreso
                        let ctaAbono = 'SIN_ASIGNAR'; 
                        const subtotal = cfdi ? cfdi.subtotal : (amount / 1.16);
                        const iva = cfdi ? cfdi.iva : (amount - subtotal);
                        entries.push({ cuenta: bankAccountCode, nombre: 'Bancos Nacionales', cargo: amount, abono: 0, rfc: '' });
                        entries.push({ cuenta: ctaAbono, nombre: 'Ventas/Ingresos', cargo: 0, abono: subtotal, rfc: cfdi ? cfdi.rfcReceptor : '' });
                        entries.push({ cuenta: ctaIvaTr, nombre: 'IVA Trasladado Cobrado', cargo: 0, abono: iva, rfc: cfdi ? cfdi.rfcReceptor : '' });
                    }
                    polizas.push({ id: mov.id, isManual: false, fecha: mov.fecha, tipo: tipoPoliza, numero: counter[tipoPoliza]++, concepto, movimientos: entries, uuidAsociado: cfdi ? cfdi.uuid : 'SIN_XML' });
                });
                return polizas;
            }, [activeBankMovements, matches, cfdis, bankAccountCode, accounts, startingFolio, policyTypeMode, gastosMeta]);

                        'Descripcion': meta.descripcion || c.concepto || '',

                const ws = XLSX.utils.json_to_sheet(data);

                    const cleanConcepto = p.concepto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").substring(0, 99);
                    txtContent += `P  ${p.fecha.replace(/-/g, '')}   ${tipoNum}        ${p.numero} 0 0.00 ${cleanConcepto}\n`;
                    p.movimientos.forEach(m => {
                        const amount = m.cargo > 0 ? m.cargo : m.abono;
                        const ctaStr = m.cuenta.replace(/-/g, '').padEnd(20, ' ');
                        const uuidPad = p.uuidAsociado.includes('SIN_XML') ? ''.padEnd(36, ' ') : p.uuidAsociado.padEnd(36, ' ');
                        const uuidCorto = p.uuidAsociado.includes('SIN_XML') ? 'MANUAL    ' : p.uuidAsociado.substring(0,8).padEnd(10, ' ');
                        txtContent += `M  ${ctaStr} ${uuidCorto} ${m.cargo > 0 ? '0' : '1'} ${amount.toFixed(2).padStart(15, ' ')} 0.00 ${cleanConcepto} ${uuidPad}\n`;
                    });
                });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([txtContent], { type: 'text/plain;charset=utf-8' }));
                link.download = `Polizas_CONTPAQI_${activeCompany.rfc}_${globalYear}_${globalMonth}.txt`;

                                                <div><label className="block text-slate-500 font-bold mb-1.5 uppercase text-[10px]">Modelo</label><select value={apiModel} onChange={e => setApiModel(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2.5 px-3 font-semibold outline-none focus:border-emerald-500">{PROVIDER_MODELS[apiProvider]?.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}</select></div>
                                            </div>
                                            <div><label className="block text-slate-500 font-bold mb-1.5 uppercase text-[10px]">API Key Privada</label><input type={showApiKey ? "text" : "password"} value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-..." className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2.5 px-3 font-mono outline-none focus:border-emerald-500" /></div>
                                            <div className="flex gap-2 pt-3 border-t border-slate-100 mt-4">
                                                <button type="submit" className="bg-emerald-500 text-slate-950 font-bold py-2.5 px-6 rounded-lg shadow-sm">Guardar API</button>
                                                <button type="button" onClick={handleTestConnection} className="border border-slate-300 text-slate-700 font-bold py-2.5 px-6 rounded-lg">{testingConnection ? 'Probando...' : 'Probar Conexión'}</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
