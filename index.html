            if (!text) return null;
            let clean = text.trim();
            if (clean.startsWith('```json')) clean = clean.substring(7);

            if (clean.endsWith('```')) clean = clean.substring(0, clean.length - 3);

        // --- FUNCIONES AUXILIARES PARA LECTURA DE XML SIN IMPORTAR NAMESPACE O CASING ---
        const getElementByLocalName = (parent, localName) => {
            if (!parent) return null;
            const tags = parent.getElementsByTagName('*');
            for (let i = 0; i < tags.length; i++) {
                const nodeLocalName = tags[i].localName || tags[i].tagName.split(':').pop();
                if (nodeLocalName && nodeLocalName.toLowerCase() === localName.toLowerCase()) {
                    return tags[i];
                }
            }
            return null;
        };

        const getElementsByLocalName = (parent, localName) => {
            const result = [];
            if (!parent) return result;
            const tags = parent.getElementsByTagName('*');
            for (let i = 0; i < tags.length; i++) {
                const nodeLocalName = tags[i].localName || tags[i].tagName.split(':').pop();
                if (nodeLocalName && nodeLocalName.toLowerCase() === localName.toLowerCase()) {
                    result.push(tags[i]);
                }
            }
            return result;
        };

        const getAttrIgnoreCase = (element, attrName) => {
            if (!element) return null;
            let val = element.getAttribute(attrName);
            if (val !== null) return val;
            for (let i = 0; i < element.attributes.length; i++) {
                const attr = element.attributes[i];
                const cleanName = attr.name.split(':').pop().toLowerCase();
                if (cleanName === attrName.toLowerCase()) {
                    return attr.value;
                }
            }
            return null;
        };

            // Comunicación HTTP genérica con el LLM seleccionado - CORREGIDAS LAS URLS MALFORMADAS
            const callAiAPI = async (prompt, systemPrompt = null, isJson = false, jsonSchema = null) => {

                        "Content-Type": "application/json",

                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {

                const fecha = getAttrIgnoreCase(comprobante, "Fecha") ? getAttrIgnoreCase(comprobante, "Fecha").substring(0, 10) : new Date().toISOString().substring(0, 10);

                const rfcReceptor = (getAttrIgnoreCase(receptor, "Rfc") || "XAXX010101000").toUpperCase();

                    tipo = "Pago";
                }

                return {
                    uuid,

                    nombreEmisor,

                    nombreReceptor,

                    subtotal,

            // --- MOTOR DE CARGA MASIVA LOCAL PARA ZIP, FOLDER COMPLETO Y SELECCIÓN MÚLTIPLE ---
            const handleLocalXmlUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                let parsedCfdis = [];
                let errorsCount = 0;

                const processFile = async (file) => {
                    if (file.name.endsWith('.zip')) {
                        try {
                            const zip = new JSZip();
                            const zipContent = await zip.loadAsync(file);
                            const zipPromises = [];

                            zipContent.forEach((relativePath, zipEntry) => {
                                if (zipEntry.name.toLowerCase().endsWith('.xml') && !zipEntry.dir) {
                                    const p = zipEntry.async("string").then(text => {
                                        try {
                                            const parsed = parseSingleXmlText(text, zipEntry.name);
                                            parsedCfdis.push(parsed);
                                        } catch (err) {
                                            errorsCount++;
                                        }
                                    });
                                    zipPromises.push(p);
                                }
                            });
                            await Promise.all(zipPromises);
                        } catch (zipErr) {
                            errorsCount++;
                        }
                    } 
                    else if (file.name.toLowerCase().endsWith('.xml')) {
                        try {
                            const text = await file.text();
                            const parsed = parseSingleXmlText(text, file.name);
                            parsedCfdis.push(parsed);
                        } catch (err) {
                            errorsCount++;
                        }
                    }
                };

                await Promise.all(files.map(file => processFile(file)));

                if (parsedCfdis.length > 0) {
                    setCfdis(prev => {
                        const existingUuids = new Set(prev.map(c => c.uuid));
                        const uniqueNew = parsedCfdis.filter(c => !existingUuids.has(c.uuid));
                        return [...prev, ...uniqueNew];
                    });
                    triggerToast(`📁 Importación completada: se agregaron ${parsedCfdis.length} XMLs.${errorsCount > 0 ? ` (${errorsCount} omitidos por errores)` : ''}`);
                    setXmlSubTab('listado');

                    triggerToast('❌ No se encontraron archivos XML legibles.');
                }
            };

                if (bankMovements.length === 0 || cfdis.length === 0) {

                    return;
                }
                const newMatches = { ...matches };
                let matchCount = 0;

                bankMovements.forEach(movement => {
                    if (newMatches[movement.id]) return;
                    const amount = movement.cargo > 0 ? movement.cargo : movement.abono;
                    const type = movement.cargo > 0 ? 'Recibido' : 'Emitido';

                    const potentialXml = cfdis.find(cfdi => {
                        const sameType = cfdi.tipo === type;
                        const sameAmount = Math.abs(cfdi.total - amount) < 0.05;
                        const alreadyAssigned = Object.values(newMatches).includes(cfdi.uuid);
                        
                        if (sameType && sameAmount && !alreadyAssigned) {
                            const daysDiff = Math.abs((new Date(cfdi.fecha) - new Date(movement.fecha)) / (1000 * 60 * 60 * 24));
                            const emisorMatch = movement.descripcion.includes(cfdi.rfcEmisor) || movement.referencia.includes(cfdi.rfcEmisor);
                            const receptorMatch = movement.descripcion.includes(cfdi.rfcReceptor) || movement.referencia.includes(cfdi.rfcReceptor);
                            
                            return (emisorMatch || receptorMatch || daysDiff <= 10);
                        }
                        return false;
                    });

                    if (potentialXml) {
                        newMatches[movement.id] = potentialXml.uuid;
                        matchCount++;
                    }
                });

                setMatches(newMatches);
                triggerToast(`✅ Conciliación inteligente completada: se enlazaron ${matchCount} transacciones.`);

                                                <select name="tipo" className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 outline-none font-semibold">
                                                    <option value="Activo">Activo</option>
                                                    <option value="Pasivo">Pasivo</option>
                                                    <option value="Ingreso">Ingreso</option>
                                                    <option value="Egreso">Egreso</option>
                                                </select>
                                            </div>
                                            <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 px-4 rounded-lg">Guardar Cuenta</button>
                                        </form>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm lg:col-span-2 flex flex-col h-[650px] font-sans">
                                    <div className="mb-4 flex items-center justify-between">
                                        <h3 className="font-bold font-sans">Mapeo de Cuentas Contables</h3>
                                        <input type="text" className="bg-slate-50 border border-slate-200 rounded-lg py-1.5 px-3 text-xs outline-none w-64" placeholder="Buscar..." value={accountSearchQuery} onChange={(e) => setAccountSearchQuery(e.target.value)} />
                                    </div>
                                    <div className="flex-1 overflow-y-auto border border-slate-100 rounded-lg text-xs">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 sticky top-0 text-slate-500 font-bold font-sans">
                                                <tr className="border-b border-slate-200">
                                                    <th className="py-2.5 px-3">Código</th>
                                                    <th className="px-3">Tipo</th>
                                                    <th className="px-3">Nombre</th>
                                                    <th className="text-center font-sans">Acción</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-mono">
                                                {filteredAccountsList.map(acc => (
                                                    <tr key={acc.codigo} className="hover:bg-slate-50">
                                                        <td className="py-2.5 px-3 font-bold text-slate-800">{acc.codigo}</td>
                                                        <td className="px-3">
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold font-sans ${acc.tipo === 'Activo' ? 'bg-blue-50 text-blue-700' : acc.tipo === 'Pasivo' ? 'bg-purple-50 text-purple-700' : 'bg-orange-50 text-orange-700'}`}>
                                                                {acc.tipo}
                                                            </span>
                                                        </td>
                                                        <td className="px-3 font-sans text-slate-600 font-semibold">{acc.nombre}</td>
                                                        <td className="text-center font-sans">
                                                            <button onClick={() => setAccounts(accounts.filter(a => a.codigo !== acc.codigo))} className="text-slate-400 hover:text-rose-600">
                                                                <i data-lucide="trash-2" className="w-4 h-4 inline font-sans"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: CONSULTOR IA */}
                        {activeTab === 'consultor-ia' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 font-sans">
                                <div className="lg:col-span-7 bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col h-[650px]">
                                    <div className="flex justify-between items-center pb-4 border-b border-slate-100 mb-4 shrink-0">
                                        <div>
                                            <h3 className="font-bold flex items-center gap-1.5 font-sans">
                                                <span>✨</span> Auditoría de Discrepancia & Diagnóstico SAT
                                            </h3>
                                            <p className="text-xs text-slate-500 font-sans">Detecta omisiones de facturas y discrepancias en tu flujo financiero.</p>
                                        </div>
                                        <button onClick={handleGenerateFiscalReport} disabled={loadingAiReport} className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 px-4 rounded-lg text-xs transition-colors font-sans">
                                            {loadingAiReport ? 'Generando...' : 'Generar Auditoría'}
                                        </button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto bg-slate-50 p-5 rounded-lg border border-slate-200 font-sans text-xs text-slate-800 leading-relaxed whitespace-pre-line overflow-x-hidden">
                                        {aiReport ? (
                                            <div>
                                                <div className="bg-emerald-50 border border-emerald-200 text-emerald-800 p-3 rounded-lg font-bold mb-4 flex items-center gap-1.5">
                                                    <i data-lucide="check-circle" className="w-4 h-4 text-emerald-600 font-sans"></i> Reporte contable estructurado por Inteligencia Artificial.
                                                </div>
                                                <div className="text-sm leading-relaxed whitespace-pre-line text-slate-700 font-sans">{aiReport}</div>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-full text-center text-slate-400 font-sans">
                                                <i data-lucide="file-text" className="w-12 h-12 mb-2 text-slate-300"></i>
                                                <h4 className="font-bold text-slate-700 text-sm font-sans">Ningún reporte activo</h4>
                                                <p className="text-xs max-w-xs mt-1 font-sans">Presiona "Generar Auditoría" para evaluar la facturación del SAT contra tus estados de cuenta bancarios.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="lg:col-span-5 bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col h-[650px] font-sans">
                                    <div className="border-b border-slate-100 pb-4 mb-4 shrink-0">
                                        <h3 className="font-bold flex items-center gap-1.5 font-sans"><i data-lucide="messages-square" className="text-indigo-500 w-5 h-5 font-sans"></i> Consultor Fiscal SAT</h3>
                                        <p className="text-xs text-slate-500 font-sans">Resuelve dudas sobre impuestos de tus movimientos del periodo.</p>
                                    </div>

                                    <div className="flex-1 overflow-y-auto space-y-4 p-4 bg-slate-50 rounded-lg border border-slate-200 mb-4 flex flex-col">
                                        {chatMessages.map((msg, index) => (
                                            <div key={index} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[85%] p-3.5 rounded-xl text-xs leading-relaxed ${msg.sender === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-250 shadow-sm'}`}>
                                                    <div className="font-bold text-[9px] text-slate-400 mb-1 uppercase tracking-wider font-sans">{msg.sender === 'user' ? 'Tú (Contribuyente)' : '✨ Consultor Contable IA'}</div>
                                                    <div className="whitespace-pre-wrap font-sans">{msg.text}</div>
                                                </div>
                                            </div>
                                        ))}
                                        {loadingChat && (
                                            <div className="text-xs text-slate-400 animate-pulse flex items-center gap-1 font-sans">
                                                <span className="w-1.5 h-1.5 rounded-full bg-slate-400 animate-bounce"></span>
                                                Escribiendo respuesta...
                                            </div>
                                        )}
                                    </div>

                                    <form onSubmit={handleSendChatMessage} className="flex gap-2 shrink-0">
                                        <input type="text" className="flex-1 bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 text-xs outline-none font-sans" placeholder="Ej: ¿Un egreso sin XML es deducible?" value={chatInput} onChange={(e) => setChatInput(e.target.value)} disabled={loadingChat} />
                                        <button type="submit" disabled={loadingChat || !chatInput.trim()} className="bg-slate-900 text-white py-2 px-4 rounded-lg text-xs font-bold hover:bg-slate-800 font-sans">Enviar</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* TAB: CONFIGURACIÓN */}
                        {activeTab === 'configuracion' && (
                            <div className="max-w-2xl mx-auto bg-white rounded-xl border border-slate-200 shadow-md overflow-hidden font-sans animate-fade-in">
                                <div className="bg-slate-900 text-white p-6 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-500/10 p-2 rounded-lg text-emerald-400 border border-emerald-500/20">
                                            <i data-lucide="settings" className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <h3 className="font-bold font-sans">Configuración de ConciliaMax</h3>
                                            <p className="text-xs text-slate-300 font-sans">Pre-registra tus datos fiscales de la cuenta y configura tus APIs de Inteligencia Artificial.</p>
                                        </div>
                                    </div>
                                    <span className="bg-slate-800 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 text-[10px] rounded-lg font-mono font-bold uppercase">
                                        Local-Only
                                    </span>
                                </div>

                                <div className="p-6 space-y-6">
                                    {/* PRE-REGISTRO DE DATOS FISCALES */}
                                    <div className="bg-white p-4 rounded-lg border border-slate-200 space-y-4">
                                        <h4 className="font-bold text-xs uppercase text-slate-500 tracking-wider">🏢 Pre-registro Contribuyente</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                                            <div>
                                                <label className="block text-slate-500 font-bold mb-1">Razón Social Registrada</label>
                                                <input 
                                                    type="text" 
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 font-medium" 
                                                    value={contribuyenteRazon} 
                                                    onChange={(e) => setContribuyenteRazon(e.target.value)} 
                                                    placeholder="Ej: SIMETRICAL S.A."
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 font-bold mb-1">RFC Oficial registrado</label>
                                                <input 
                                                    type="text" 
                                                    maxLength={13}
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 font-mono font-bold text-emerald-600 uppercase" 
                                                    value={contribuyenteRfc} 
                                                    onChange={(e) => setContribuyenteRfc(e.target.value.toUpperCase())} 
                                                    placeholder="Ej: SIM100812NP3"
                                                />
                                            </div>
                                        </div>
                                        <p className="text-[10px] text-slate-400 italic font-sans">Establece el RFC y nombre con el cual tu e.firma debe contrastarse de forma obligatoria.</p>
                                    </div>

                                    <form onSubmit={handleSaveConfig} className="space-y-4 text-xs font-sans">
                                        <div>
                                            <label className="block text-slate-500 font-bold mb-1.5 uppercase font-sans">Proveedor LLM</label>
                                            <select 
                                                value={apiProvider} 
                                                onChange={(e) => {
                                                    const prov = e.target.value;
                                                    setApiProvider(prov);
                                                    const defaultModel = PROVIDER_MODELS[prov][0].value;
                                                    setApiModel(defaultModel);
                                                }} 
                                                className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 outline-none font-semibold font-sans"
                                            >
                                                <option value="google">Google AI Studio (Gemini)</option>
                                                <option value="anthropic">Anthropic Console (Claude)</option>
                                                <option value="openai">OpenAI (GPT)</option>
                                                <option value="openrouter">OpenRouter (Modelos Diversos)</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-slate-500 font-bold mb-1.5 uppercase font-sans">API Key del Proveedor</label>
                                            <div className="relative font-mono">
                                                <input 
                                                    type={showApiKey ? "text" : "password"} 
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 pl-3 pr-10 font-mono outline-none" 
                                                    placeholder={
                                                        apiProvider === 'google' ? "AIzaSy..." :
                                                        apiProvider === 'anthropic' ? "sk-ant-..." :
                                                        apiProvider === 'openai' ? "sk-proj-..." : "sk-or-..."
                                                    } 
                                                    value={apiKey} 
                                                    onChange={(e) => setApiKey(e.target.value)} 
                                                    required 
                                                />
                                                <button type="button" onClick={() => setShowApiKey(!showApiKey)} className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                                                    <i data-lucide={showApiKey ? "eye-off" : "eye"} className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-slate-500 font-bold mb-1.5 uppercase font-sans">Modelo de IA Seleccionado</label>
                                            <select 
                                                value={apiModel} 
                                                onChange={(e) => setApiModel(e.target.value)} 
                                                className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 outline-none font-semibold font-sans"
                                            >
                                                {(PROVIDER_MODELS[apiProvider] || PROVIDER_MODELS.google).map(model => (
                                                    <option key={model.value} value={model.value}>{model.label}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div className="flex gap-2 pt-4 border-t border-slate-100 flex-wrap font-sans">
                                            <button type="submit" className="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2 px-5 rounded-lg font-sans">Guardar Configuración</button>
                                            <button type="button" onClick={handleTestConnection} disabled={testingConnection} className="border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-2 px-5 rounded-lg font-sans">
                                                {testingConnection ? 'Probando...' : 'Probar Conexión'}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 py-6 mt-12 text-center text-xs text-slate-500 font-sans shrink-0">
                        <div className="max-w-7xl mx-auto px-4">
                            <p>© 2026 ConciliaMax México Contable. Desarrollado para importaciones a CONTPAQi i Contabilidad y Alegra ERP.</p>
                            <p className="mt-1 text-slate-400">Los archivos de pólizas generados son compatibles con la estructura XML del SAT (Versión CFDI 4.0).</p>
                        </div>
                    </footer>

                    {/* MODAL: XML VISUALIZER */}
                    {selectedCfdi && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in font-sans">
                            <div className="bg-white rounded-xl shadow-2xl border border-slate-200 max-w-2xl w-full overflow-hidden">
                                <div className="bg-slate-950 text-white p-4 flex justify-between items-center">
                                    <div className="flex items-center gap-2 font-mono">
                                        <i data-lucide="file-code" className="text-emerald-400 w-5 h-5"></i>
                                        <h3 className="font-bold text-sm">Visor XML CFDI 4.0</h3>
                                    </div>
                                    <button onClick={() => setSelectedCfdi(null)} className="text-slate-400 hover:text-white transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <div className="p-6 space-y-4 max-h-[450px] overflow-y-auto">
                                    <div className="bg-slate-50 p-4 rounded-lg font-mono text-[10px] text-slate-700 border border-slate-200 leading-normal">
                                        <span className="text-blue-600">&lt;cfdi:Comprobante</span> Version="4.0" Fecha="{selectedCfdi.fecha}" Total="{selectedCfdi.total.toFixed(2)}" UUID="{selectedCfdi.uuid}"<span className="text-blue-600">&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Emisor</span> Rfc="{selectedCfdi.rfcEmisor}" Nombre="{selectedCfdi.nombreEmisor}"<span className="text-blue-600">/&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Receptor</span> Rfc="{selectedCfdi.rfcReceptor}" Nombre="{selectedCfdi.nombreReceptor}"<span className="text-blue-600">/&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Conceptos&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Concepto</span> Descripcion="{selectedCfdi.concepto}" Importe="{selectedCfdi.subtotal.toFixed(2)}"<span className="text-blue-600">/&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;/cfdi:Conceptos&gt;</span><br />
                                        <span className="text-blue-600">&lt;/cfdi:Comprobante&gt;</span>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-end">
                                    <button onClick={() => setSelectedCfdi(null)} className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-1.5 px-4 rounded text-xs transition-all font-sans">
                                        Cerrar Vista
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            if (window.lucide) lucide.createIcons();
        }, 1000);
    </script>
</body>
</html>
