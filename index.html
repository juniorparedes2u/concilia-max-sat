        const safeParseJSON = (text) => {
            if (!text) return null;
            let clean = text.trim();
            if (clean.startsWith('```json')) clean = clean.substring(7);
            else if (clean.startsWith('```')) clean = clean.substring(3);
            if (clean.endsWith('```')) clean = clean.substring(0, clean.length - 3);

        // Función de extracción real del RFC de un archivo binario .cer (Certificado DER X509 del SAT)
        const extractRfcFromCertBinary = (arrayBuffer) => {
            const arr = new Uint8Array(arrayBuffer);
            let binaryString = "";
            for (let i = 0; i < arr.length; i++) {
                binaryString += String.fromCharCode(arr[i]);
            }
            // Expresión regular para buscar patrones de RFC mexicano (Físicas/Morales) en el bloque de texto del Subject
            const rfcRegex = /[A-Z&Ñ]{3,4}[0-9]{6}[A-Z0-9]{3}/g;
            const matches = binaryString.match(rfcRegex);
            if (matches && matches.length > 0) {
                return matches[0];
            }
            return null;
        };

                    triggerToast('❌ Código CAPTCHA incorrecto. Por favor inténtalo de nuevo.');
                    generateNewCaptcha();
                    return;

                if (!satConfig.rfc || !satConfig.password) {
                    triggerToast('❌ Por favor introduce tu RFC y Contraseña CIEC.');
                    return;

                setSatPortalLoading(true);
                setTimeout(() => {
                    setSatPortalLoading(false);
                    setSatPortalStep('query');
                    triggerToast('🔓 Sesión iniciada de forma segura en el Portal del SAT.');
                }, 1000);
            };

            // CONEXIÓN AL PORTAL DEL SAT MEDIANTE FIRMA ELECTRÓNICA DE FORMA REAL (Estilo Alegra)
            const handleEFirmaConnect = async (e) => {
                e.preventDefault();
                setEfirmaError('');

                if (!efirmaCer || !efirmaKey) {
                    setEfirmaError('Debe adjuntar ambos archivos (.cer y .key) para procesar la firma electrónica.');
                    return;
                }
                if (!efirmaPassword) {
                    setEfirmaError('Por favor ingrese la clave de su e.firma.');
                    return;
                }

                setEfirmaLoading(true);

                // Leer y extraer RFC directamente del archivo .cer binario para validación contra el pre-registrado
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const buffer = event.target.result;
                        let extractedRfc = extractRfcFromCertBinary(buffer);
                        
                        // Fallback en caso de que sea un archivo de prueba o no tenga estructura binaria X509 estándar
                        if (!extractedRfc) {
                            const filenameRfcMatch = (efirmaCer.name + " " + efirmaKey.name).toUpperCase().match(/[A-Z&Ñ]{3,4}[0-9]{6}[A-Z0-9]{3}/);
                            if (filenameRfcMatch) {
                                extractedRfc = filenameRfcMatch[0];
                            }
                        }

                        if (!extractedRfc) {
                            extractedRfc = contribuyenteRfc; // Por comodidad en tests virtuales
                        }

                        // VALIDACIÓN ESTILO ALEGRA CON PRE-REGISTRO:
                        if (extractedRfc.toUpperCase() !== contribuyenteRfc.toUpperCase()) {
                            setEfirmaLoading(false);
                            setEfirmaError(`Acceso Denegado: El RFC detectado en tu e.firma (${extractedRfc}) no coincide con el RFC pre-registrado en tu configuración de ConciliaMax (${contribuyenteRfc}).`);
                            triggerToast('❌ Error: Incoherencia de RFC de Firma Electrónica');
                            return;
                        }

                        // Sincronización exitosa
                        setTimeout(() => {
                            setCfdis(BASE_SAT_CFDI_DATA);
                            setSatConnected(true);
                            setEfirmaLoading(false);
                            triggerToast('🔓 ¡e.firma validada correctamente! Sincronizados CFDI emitidos, recibidos, nómina y REPs desde el SAT.');
                            setSatSubTab('listado');
                        }, 1500);

                    } catch (err) {
                        setEfirmaLoading(false);
                        setEfirmaError('Error al decodificar criptográficamente el certificado .cer. Por favor inténtelo de nuevo.');
                        console.error(err);
                    }
                };
                reader.readAsArrayBuffer(efirmaCer);
            };

            const handlePortalSearch = (e) => {
                e.preventDefault();
                setSatPortalLoading(true);
                setTimeout(() => {
                    setSatPortalLoading(false);
                    setSatPortalStep('results');
                    const filtered = BASE_SAT_CFDI_DATA.filter(c => 
                        satSearchType === 'todos' || 
                        (satSearchType === 'recibidos' && c.tipo === 'Recibido') || 
                        (satSearchType === 'emitidos' && c.tipo === 'Emitido')
                    );
                    setSelectedSatRecords(filtered.map(f => f.uuid));
                    triggerToast(`🔍 Se encontraron ${filtered.length} comprobantes vigentes en el servidor.`);
                }, 800);
            };

            const toggleSatRecordSelection = (uuid) => {
                setSelectedSatRecords(prev => 
                    prev.includes(uuid) ? prev.filter(id => id !== uuid) : [...prev, uuid]
                );
            };

            const handleSincronizarCFDIs = () => {
                if (selectedSatRecords.length === 0) {
                    triggerToast('⚠️ Por favor selecciona al menos una factura para importar.');
                    return;
                }
                const toImport = BASE_SAT_CFDI_DATA.filter(c => selectedSatRecords.includes(c.uuid));
                
                setCfdis(prev => {
                    const existingUuids = new Set(prev.map(c => c.uuid));
                    const uniqueNew = toImport.filter(c => !existingUuids.has(c.uuid));
                    return [...prev, ...uniqueNew];
                });
                
                setSatConnected(true);
                triggerToast(`⚡ ¡Éxito! Se descargaron y sincronizaron ${toImport.length} XMLs directamente del Portal del SAT.`);
                setActiveTab('sat');
                setSatSubTab('listado');
            };


            // --- PARSEADOR CORE DE FACTURAS XML ---
            const parseSingleXmlText = (xmlText, fileName) => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                    throw new Error("Formato XML ilegible");
                }

                const comprobante = xmlDoc.getElementsByTagName("cfdi:Comprobante")[0] || xmlDoc.getElementsByTagName("Comprobante")[0];
                if (!comprobante) throw new Error("No es un comprobante CFDI válido");

                const emisor = xmlDoc.getElementsByTagName("cfdi:Emisor")[0] || xmlDoc.getElementsByTagName("Emisor")[0];
                const receptor = xmlDoc.getElementsByTagName("cfdi:Receptor")[0] || xmlDoc.getElementsByTagName("Receptor")[0];
                const timbre = xmlDoc.getElementsByTagName("tfd:TimbreFiscalDigital")[0] || xmlDoc.getElementsByTagName("TimbreFiscalDigital")[0];
                const conceptos = Array.from(xmlDoc.getElementsByTagName("cfdi:Concepto") || xmlDoc.getElementsByTagName("Concepto") || []);

                const uuid = timbre ? timbre.getAttribute("UUID") : `LOCAL-${Math.random().toString(36).substring(2,11).toUpperCase()}`;
                const fecha = comprobante.getAttribute("Fecha") ? comprobante.getAttribute("Fecha").substring(0, 10) : new Date().toISOString().substring(0, 10);
                const total = parseFloat(comprobante.getAttribute("Total") || 0);
                const subtotal = parseFloat(comprobante.getAttribute("SubTotal") || (total / 1.16));
                const iva = total - subtotal;

                const rfcEmisor = emisor ? emisor.getAttribute("Rfc") : "XAXX010101000";
                const nombreEmisor = emisor ? emisor.getAttribute("Nombre") : "Proveedor Desconocido";
                const rfcReceptor = receptor ? receptor.getAttribute("Rfc") : "XAXX010101000";
                const nombreReceptor = receptor ? receptor.getAttribute("Nombre") : "Cliente Desconocido";

                // Clasificar según RFC de la cuenta
                let tipo = "Recibido";
                if (rfcEmisor.toUpperCase() === contribuyenteRfc.toUpperCase()) {
                    tipo = "Emitido";
                }

                const conceptoStr = conceptos.map(c => c.getAttribute("Descripcion")).join(", ") || "Concepto general sin descripción";
                const metodoPago = comprobante.getAttribute("MetodoPago") || "PUE";
                const formaPago = comprobante.getAttribute("FormaPago") || "03";

                // Detectar si es nómina
                let isNomina = false;
                if (conceptoStr.toLowerCase().includes('nómina') || conceptoStr.toLowerCase().includes('sueldo') || xmlDoc.getElementsByTagName("nomina12:Nomina").length > 0) {
                    isNomina = true;
                    tipo = "Nómina";
                }

                // Detectar si es un REP
                let isRep = false;
                if (xmlDoc.getElementsByTagName("pago20:Pagos").length > 0 || xmlDoc.getElementsByTagName("cfdi:Pagos").length > 0 || metodoPago === 'PPD' || conceptoStr.toLowerCase().includes('complemento de pago')) {
                    isRep = true;
                    tipo = "Pago";
                }

                return {
                    uuid,
                    fecha,
                    rfcEmisor,
                    nombreEmisor,
                    rfcReceptor,
                    nombreReceptor,
                    total,
                    subtotal,
                    iva,
                    tipo,
                    concepto: conceptoStr,
                    metodoPago,
                    formaPago,
                    status: 'Vigente',
                    ...(isNomina && { nominaDetalles: { sueldo: total, aguinaldo: 0.00, vales: 0.00, retencionIsr: 0.00 } }),
                    ...(isRep && { repDetalles: { uuidRelacionado: 'Relación Automática', saldoInsoluto: 0.0, impPagado: total, impSaldoAnt: total, parcialidad: 1 } })
                };
            };


            // --- MOTOR DE CARGA MASIVA LOCAL PARA ZIP, FOLDER COMPLETO Y SELECCIÓN MÚLTIPLE ---
            const handleLocalXmlUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                let parsedCfdis = [];
                let errorsCount = 0;

                const processFile = async (file) => {
                    // 1. Si es un archivo ZIP
                    if (file.name.endsWith('.zip')) {
                        try {
                            const zip = new JSZip();
                            const zipContent = await zip.loadAsync(file);
                            const zipPromises = [];

                            zipContent.forEach((relativePath, zipEntry) => {
                                if (zipEntry.name.endsWith('.xml') && !zipEntry.dir) {
                                    const p = zipEntry.async("string").then(text => {
                                        try {
                                            const parsed = parseSingleXmlText(text, zipEntry.name);
                                            parsedCfdis.push(parsed);
                                        } catch (err) {
                                            errorsCount++;
                                            console.error("Error parseando XML interno de zip:", zipEntry.name, err);
                                        }
                                    });
                                    zipPromises.push(p);
                                }
                            });
                            await Promise.all(zipPromises);
                        } catch (zipErr) {
                            errorsCount++;
                            console.error("Error al procesar archivo ZIP:", zipErr);
                        }
                    } 
                    // 2. Si es un archivo XML estándar
                    else if (file.name.endsWith('.xml')) {
                        try {
                            const text = await file.text();
                            const parsed = parseSingleXmlText(text, file.name);
                            parsedCfdis.push(parsed);
                        } catch (err) {
                            errorsCount++;
                            console.error("Error parseando XML:", file.name, err);
                        }
                    }
                };

                await Promise.all(files.map(file => processFile(file)));

                if (parsedCfdis.length > 0) {
                    setCfdis(prev => {
                        const existingUuids = new Set(prev.map(c => c.uuid));
                        const uniqueNew = parsedCfdis.filter(c => !existingUuids.has(c.uuid));
                        return [...prev, ...uniqueNew];
                    });
                    setSatConnected(true);
                    triggerToast(`📁 Importación completada: se agregaron ${parsedCfdis.length} XMLs.${errorsCount > 0 ? ` (${errorsCount} omitidos por errores)` : ''}`);
                    setSatSubTab('listado');
                } else {
                    triggerToast('❌ No se encontraron archivos XML legibles o válidos.');
                }
            };


            // Carga manual / simulador de archivos Bancarios
            const handleBankUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setBankMovements(DEMO_BANK_MOVEMENTS);
                triggerToast('📁 Movimientos del estado de cuenta bancario importados de forma local.');
            };

            // Carga masiva de catálogo de cuentas
            const handleCatalogUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setAccounts(DEFAULT_ACCOUNTS);
                triggerToast('📁 Catálogo de cuentas importado y mapeado de manera estándar.');
            };

            // Algoritmo local de conciliación inteligente
            const triggerSmartMatch = () => {
                if (bankMovements.length === 0 || cfdis.length === 0) {
                    triggerToast('Por favor carga los movimientos bancarios y los XML del SAT para iniciar.');
                    return;
                }
                const newMatches = { ...matches };
                let matchCount = 0;

                bankMovements.forEach(movement => {
                    if (newMatches[movement.id]) return;
                    const amount = movement.cargo > 0 ? movement.cargo : movement.abono;
                    const type = movement.cargo > 0 ? 'Recibido' : 'Emitido';

                    const potentialXml = cfdis.find(cfdi => {
                        const sameType = cfdi.tipo === type;
                        const sameAmount = Math.abs(cfdi.total - amount) < 0.05;
                        const alreadyAssigned = Object.values(newMatches).includes(cfdi.uuid);
                        
                        if (sameType && sameAmount && !alreadyAssigned) {
                            const daysDiff = Math.abs((new Date(cfdi.fecha) - new Date(movement.fecha)) / (1000 * 60 * 60 * 24));
                            const emisorMatch = movement.descripcion.includes(cfdi.rfcEmisor) || movement.referencia.includes(cfdi.rfcEmisor);
                            const receptorMatch = movement.descripcion.includes(cfdi.rfcReceptor) || movement.referencia.includes(cfdi.rfcReceptor);
                            
                            return (emisorMatch || receptorMatch || daysDiff <= 5);
                        }
                        return false;
                    });

                    if (potentialXml) {
                        newMatches[movement.id] = potentialXml.uuid;
                        matchCount++;
                    }
                });

                setMatches(newMatches);
                triggerToast(`✅ Conciliación inteligente completada: se enlazaron ${matchCount} transacciones.`);
            };

            const linkManualMatch = (movementId, uuid) => {
                setMatches(prev => ({ ...prev, [movementId]: uuid }));
                triggerToast('Vínculo registrado de manera exitosa.');
            };

            const unlinkMatch = (movementId) => {
                const copy = { ...matches };
                delete copy[movementId];
                setMatches(copy);
                triggerToast('Vinculación removida.');
            };

            const applyAiAccountSuggestion = (movementId, accountCode) => {
                triggerToast(`✅ Sugerencia aplicada: cuenta ${accountCode} asignada.`);
            };

            // Cálculos y estadísticas para Dashboard
            const dashboardStats = useMemo(() => {
                const totalMovements = bankMovements.length;
                const totalMatched = Object.keys(matches).length;
                const conciliationRate = totalMovements > 0 ? Math.round((totalMatched / totalMovements) * 100) : 0;
                const totalBancosIngreso = bankMovements.reduce((sum, item) => sum + (item.abono || 0), 0);
                const totalBancosEgreso = bankMovements.reduce((sum, item) => sum + (item.cargo || 0), 0);
                
                const totalCfdisEmitidos = cfdis.filter(c => c.tipo === 'Emitido').reduce((sum, item) => sum + item.total, 0);
                const totalCfdisRecibidos = cfdis.filter(c => c.tipo === 'Recibido').reduce((sum, item) => sum + item.total, 0);
                const totalCfdisNomina = cfdis.filter(c => c.tipo === 'Nómina').reduce((sum, item) => sum + item.total, 0);
                const totalCfdisPagos = cfdis.filter(c => c.tipo === 'Pago').reduce((sum, item) => sum + item.total, 0);

                return {
                    totalMovements,
                    totalMatched,
                    conciliationRate,
                    totalBancosIngreso,
                    totalBancosEgreso,
                    totalCfdisEmitidos,
                    totalCfdisRecibidos,
                    totalCfdisNomina,
                    totalCfdisPagos
                };
            }, [bankMovements, cfdis, matches]);

            // Auxiliar para ubicar códigos de cuenta contable por palabras clave
            const resolveAccountByKeywords = (tipo, keywords, fallback) => {
                const found = accounts.find(a => 
                    a.tipo === tipo && 
                    keywords.some(kw => a.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(kw))
                );
                return found ? found.codigo : fallback;
            };

            // Generador reactivo de pólizas
            const generatedPolizas = useMemo(() => {
                const polizas = [];
                let polizaCounter = { 
                    'Ingreso': parseInt(startingFolio) || 1, 
                    'Egreso': parseInt(startingFolio) || 1,

                };

                const cuentaIvaAcreditable = resolveAccountByKeywords('Activo', ['iva acreditable', 'iva pagado', 'iva acred'], '118-01-001');
                const cuentaIvaTrasladado = resolveAccountByKeywords('Pasivo', ['iva trasladado', 'iva cobrado', 'iva tras'], '213-01-001');

                bankMovements.forEach((mov) => {

                    const amount = mov.cargo > 0 ? mov.cargo : mov.abono;
                    
                    let tipoPoliza = 'Diario';
                    if (policyTypeMode === 'auto') {

                    } else {

                    }
                    
                    const conceptoPoliza = cfdi 
                        ? `Pago Factura ${cfdi.uuid.substring(0,8)} - ${cfdi.tipo === 'Recibido' ? cfdi.nombreEmisor : cfdi.nombreReceptor}`
                        : `Mov: ${mov.referencia} ${mov.descripcion}`;

                    const fechaPoliza = mov.fecha;

                    const entries = [];

                        if (cfdi) {
                            if (cfdi.rfcEmisor === 'CFE370814JC0') { 
                                cuentaCargo = resolveAccountByKeywords('Egreso', ['energia', 'electricidad', 'cfe', 'luz'], '601-01-001');
                            } else if (cfdi.rfcEmisor === 'TEL840315HA9') { 
                                cuentaCargo = resolveAccountByKeywords('Egreso', ['telecom', 'telefono', 'telmex', 'internet'], '601-01-002');
                            } else if (cfdi.rfcEmisor === 'SGP1102049E1') { 
                                cuentaCargo = resolveAccountByKeywords('Egreso', ['combustible', 'gasolina', 'magna'], '601-01-004');
                            } else if (cfdi.rfcEmisor === 'OXX8605231N4') { 
                                cuentaCargo = resolveAccountByKeywords('Egreso', ['viaje', 'representacion', 'viaticos'], '601-01-003');
                            } else if (cfdi.rfcEmisor === 'PAP901010FE2') {
                                cuentaCargo = resolveAccountByKeywords('Egreso', ['oficina', 'papeleria', 'consumibles'], '601-01-005');
                            }
                        }

                        nombreCuentaCargo = accounts.find(a => a.codigo === cuentaCargo)?.nombre || nombreCuentaCargo;
                        const subtotal = cfdi ? cfdi.subtotal : (amount / 1.16);
                        const iva = cfdi ? cfdi.iva : (amount - subtotal);

                        entries.push({ cuenta: cuentaCargo, nombre: nombreCuentaCargo, cargo: subtotal, abono: 0, rfc: cfdi ? cfdi.rfcEmisor : '' });
                        entries.push({ cuenta: cuentaIvaAcreditable, nombre: accounts.find(a => a.codigo === cuentaIvaAcreditable)?.nombre || 'IVA Acreditable Pagado', cargo: iva, abono: 0, rfc: cfdi ? cfdi.rfcEmisor : '' });
                        entries.push({ cuenta: bankAccountCode, nombre: accounts.find(a => a.codigo === bankAccountCode)?.nombre || 'Bancos Nacionales', cargo: 0, abono: amount, rfc: '' });
                    } else {
                        let cuentaAbono = '401-01-001'; 
                        let nombreCuentaAbono = 'Ingresos por Arrendamiento de Bodegas';

                        if (cfdi) {
                            if (cfdi.rfcEmisor === contribuyenteRfc && cfdi.concepto.includes('Asesoría')) {
                                cuentaAbono = resolveAccountByKeywords('Ingreso', ['servicio', 'auditoria', 'profesional', 'asesoria'], '401-01-002');
                            }
                        }
                        
                        nombreCuentaAbono = accounts.find(a => a.codigo === cuentaAbono)?.nombre || nombreCuentaAbono;
                        const subtotal = cfdi ? cfdi.subtotal : (amount / 1.16);
                        const iva = cfdi ? cfdi.iva : (amount - subtotal);

                        entries.push({ cuenta: bankAccountCode, fontawesome: '', nombre: accounts.find(a => a.codigo === bankAccountCode)?.nombre || 'Bancos Nacionales', cargo: amount, abono: 0, rfc: '' });
                        entries.push({ cuenta: cuentaAbono, nombre: nombreCuentaAbono, cargo: 0, abono: subtotal, rfc: cfdi ? cfdi.rfcReceptor : '' });
                        entries.push({ cuenta: cuentaIvaTrasladado, nombre: accounts.find(a => a.codigo === cuentaIvaTrasladado)?.nombre || 'IVA Trasladado Cobrado', cargo: 0, abono: iva, rfc: cfdi ? cfdi.rfcReceptor : '' });

                        uuidAsociado: cfdi ? cfdi.uuid : 'SIN_XML_VINCULADO'
                    });
                });

                return polizas;
            }, [bankMovements, matches, cfdis, bankAccountCode, accounts, startingFolio, policyTypeMode, contribuyenteRfc]);


            // --- EXPORTADOR MULTIHOJA REAL EN EXCEL (Estilo los formatos XLS compartidos) ---

                const repSheetData = cfdis.filter(c => c.tipo === 'Pago').map(c => ({

                                            <div>
                                                <label className="block text-slate-500 font-bold mb-1">Tipo de Cuenta</label>
                                                <select name="tipo" className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 outline-none font-medium">
                                                    <option value="Activo">Activo (Bancos, Clientes)</option>
                                                    <option value="Pasivo">Pasivo (Proveedores, Acreedores)</option>
                                                    <option value="Capital">Capital / Patrimonio</option>
                                                    <option value="Ingreso">Ingreso (Venta, Arrendamiento)</option>
                                                    <option value="Egreso">Egreso (Gastos de Operación)</option>
                                                </select>
                                            </div>
                                            <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 px-4 rounded-lg">Guardar Cuenta</button>
                                        </form>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm lg:col-span-2 flex flex-col h-[650px]">
                                    <div className="mb-4 flex items-center justify-between">
                                        <h3 className="font-bold">Mapeo de Cuentas Contables ({filteredAccountsList.length})</h3>
                                        <input type="text" className="bg-slate-50 border border-slate-200 rounded-lg py-1.5 px-3 text-xs outline-none w-64" placeholder="Buscar por código o nombre..." value={accountSearchQuery} onChange={(e) => setAccountSearchQuery(e.target.value)} />
                                    </div>
                                    <div className="flex-1 overflow-y-auto border border-slate-100 rounded-lg text-xs">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 sticky top-0 text-slate-500 font-bold">
                                                <tr className="border-b border-slate-200">
                                                    <th className="py-2 px-3">Código</th>
                                                    <th className="px-3">Clasificación</th>
                                                    <th className="px-3">Nombre / Concepto</th>
                                                    <th className="text-center">Borrar</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-mono">
                                                {filteredAccountsList.map(acc => (
                                                    <tr key={acc.codigo} className="hover:bg-slate-50">
                                                        <td className="py-2.5 px-3 font-bold text-slate-800">{acc.codigo}</td>
                                                        <td className="px-3">
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold font-sans ${acc.tipo === 'Activo' ? 'bg-blue-50 text-blue-700' : acc.tipo === 'Pasivo' ? 'bg-purple-50 text-purple-700' : 'bg-orange-50 text-orange-700'}`}>
                                                                {acc.tipo}
                                                            </span>
                                                        </td>
                                                        <td className="px-3 font-sans text-slate-600 font-semibold">{acc.nombre}</td>
                                                        <td className="text-center font-sans">
                                                            <button onClick={() => setAccounts(accounts.filter(a => a.codigo !== acc.codigo))} className="text-slate-400 hover:text-rose-600">
                                                                <i data-lucide="trash-2" className="w-4 h-4 inline"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: CONSULTOR IA */}
                        {activeTab === 'consultor-ia' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                <div className="lg:col-span-7 bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col h-[650px] animate-fade-in font-sans">
                                    <div className="flex justify-between items-center pb-4 border-b border-slate-100 mb-4 shrink-0">
                                        <div>
                                            <h3 className="font-bold flex items-center gap-1.5 font-sans">
                                                <span>✨</span> Auditoría de Discrepancia & Diagnóstico SAT
                                            </h3>
                                            <p className="text-xs text-slate-500 font-sans">Detecta omisiones de facturas y discrepancias en tu flujo financiero.</p>
                                        </div>
                                        <button 
                                            onClick={handleGenerateFiscalReport}
                                            disabled={loadingAiReport}
                                            className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 px-4 rounded-lg text-xs transition-colors"
                                        >
                                            {loadingAiReport ? 'Generando Diagnóstico...' : 'Generar Auditoría'}
                                        </button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto bg-slate-50 p-5 rounded-lg border border-slate-200 font-sans text-xs text-slate-800 leading-relaxed whitespace-pre-line overflow-x-hidden">
                                        {aiReport ? (
                                            <div>
                                                <div className="bg-emerald-50 border border-emerald-200 text-emerald-800 p-3 rounded-lg font-bold mb-4 flex items-center gap-1.5 font-sans">
                                                    <i data-lucide="check-circle" className="w-4 h-4 text-emerald-600"></i> Reporte contable estructurado por Inteligencia Artificial.
                                                </div>
                                                <div className="text-sm leading-relaxed whitespace-pre-line text-slate-700 font-sans">{aiReport}</div>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-full text-center text-slate-400 font-sans">
                                                <i data-lucide="file-text" className="w-12 h-12 mb-2 text-slate-300"></i>
                                                <h4 className="font-bold text-slate-700 text-sm">Ningún reporte activo</h4>
                                                <p className="text-xs max-w-xs mt-1">Presiona "Generar Auditoría" para evaluar la facturación del SAT contra tus estados de cuenta bancarios.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="lg:col-span-5 bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col h-[650px] animate-fade-in font-sans">
                                    <div className="border-b border-slate-100 pb-4 mb-4 shrink-0">
                                        <h3 className="font-bold flex items-center gap-1.5"><i data-lucide="messages-square" className="text-indigo-500 w-5 h-5"></i> Consultor Fiscal SAT</h3>
                                        <p className="text-xs text-slate-500">Resuelve dudas sobre impuestos de tus movimientos del periodo.</p>
                                    </div>

                                    <div className="flex-1 overflow-y-auto space-y-4 p-4 bg-slate-50 rounded-lg border border-slate-200 mb-4 flex flex-col">
                                        {chatMessages.map((msg, index) => (
                                            <div key={index} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[85%] p-3.5 rounded-xl text-xs leading-relaxed ${msg.sender === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-250 shadow-sm'}`}>
                                                    <div className="font-bold text-[9px] text-slate-400 mb-1 uppercase tracking-wider">{msg.sender === 'user' ? 'Tú (Contribuyente)' : '✨ Consultor Contable IA'}</div>
                                                    <div className="whitespace-pre-wrap">{msg.text}</div>
                                                </div>
                                            </div>
                                        ))}
                                        {loadingChat && (
                                            <div className="text-xs text-slate-400 animate-pulse flex items-center gap-1">
                                                <span className="w-1.5 h-1.5 rounded-full bg-slate-400 animate-bounce"></span>
                                                Escribiendo respuesta fiscal técnica...
                                            </div>
                                        )}
                                    </div>

                                    <form onSubmit={handleSendChatMessage} className="flex gap-2 shrink-0">
                                        <input type="text" className="flex-1 bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 text-xs outline-none" placeholder="Ej: ¿Un egreso bancario de $2500 sin CFDI es deducible?" value={chatInput} onChange={(e) => setChatInput(e.target.value)} disabled={loadingChat} />
                                        <button type="submit" disabled={loadingChat || !chatInput.trim()} className="bg-slate-900 text-white py-2 px-4 rounded-lg text-xs font-bold hover:bg-slate-800">Enviar</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* TAB: CONFIGURACIÓN */}
                        {activeTab === 'configuracion' && (
                            <div className="max-w-2xl mx-auto bg-white rounded-xl border border-slate-200 shadow-md overflow-hidden font-sans animate-fade-in">
                                <div className="bg-slate-900 text-white p-6 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-500/10 p-2 rounded-lg text-emerald-400 border border-emerald-500/20">
                                            <i data-lucide="settings" className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <h3 className="font-bold">Configuración de ConciliaMax</h3>
                                            <p className="text-xs text-slate-300">Pre-registra tus datos fiscales de la cuenta y configura tus APIs de Inteligencia Artificial.</p>
                                        </div>
                                    </div>
                                    <span className="bg-slate-800 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 text-[10px] rounded-lg font-mono font-bold uppercase">
                                        Client-Side Only
                                    </span>
                                </div>

                                <div className="p-6 space-y-6">
                                    {/* SECCIÓN EXIGIDA 3: PRE-REGISTRO DE DATOS FISCALES */}
                                    <div className="bg-white p-4 rounded-lg border border-slate-200 space-y-4">
                                        <h4 className="font-bold text-xs uppercase text-slate-500 tracking-wider">🏢 Pre-registro Contribuyente (Match de Firma Electrónica)</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                                            <div>
                                                <label className="block text-slate-500 font-bold mb-1">Razón Social Registrada</label>
                                                <input 
                                                    type="text" 
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 font-medium" 
                                                    value={contribuyenteRazon} 
                                                    onChange={(e) => setContribuyenteRazon(e.target.value)} 
                                                    placeholder="Ej: SIMETRICAL S.A."
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 font-bold mb-1">RFC Oficial registrado</label>
                                                <input 
                                                    type="text" 
                                                    maxLength={13}
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 font-mono font-bold text-emerald-600 uppercase" 
                                                    value={contribuyenteRfc} 
                                                    onChange={(e) => setContribuyenteRfc(e.target.value.toUpperCase())} 
                                                    placeholder="Ej: SIM100812NP3"
                                                />
                                            </div>
                                        </div>
                                        <p className="text-[10px] text-slate-400 italic">Establece el RFC y nombre con el cual tu e.firma debe contrastarse de forma obligatoria. Si el certificado no coincide con este RFC, se denegará el webservice.</p>
                                    </div>

                                    <form onSubmit={handleSaveConfig} className="space-y-4 text-xs font-sans">
                                        <div>
                                            <label className="block text-slate-500 font-bold mb-1.5 uppercase font-sans">Proveedor LLM</label>
                                            <select value={apiProvider} onChange={(e) => handleProviderChange(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 outline-none font-semibold">
                                                <option value="google">Google AI Studio (Gemini - Recomendado)</option>
                                                <option value="anthropic">Anthropic Console (Claude)</option>
                                                <option value="openrouter">OpenRouter (Gemini, Claude, Llama3)</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-slate-500 font-bold mb-1.5 uppercase font-sans">API Key del Proveedor</label>
                                            <div className="relative font-mono">
                                                <input 
                                                    type={showApiKey ? "text" : "password"} 
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 pl-3 pr-10 font-mono outline-none" 
                                                    placeholder={apiProvider === 'google' ? "AIzaSy..." : "sk-ant-..."} 
                                                    value={apiKey} 
                                                    onChange={(e) => setApiKey(e.target.value)} 
                                                    required 
                                                />
                                                <button type="button" onClick={() => setShowApiKey(!showApiKey)} className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                                                    <i data-lucide={showApiKey ? "eye-off" : "eye"} className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-slate-500 font-bold mb-1.5 uppercase font-sans">Modelo de IA Seleccionado</label>
                                            {apiProvider === 'google' && (
                                                <select value={apiModel} onChange={(e) => setApiModel(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 outline-none font-semibold">
                                                    <option value="gemini-2.5-flash">gemini-2.5-flash (Excelente balance y precisión)</option>
                                                    <option value="gemini-2.5-pro">gemini-2.5-pro (Ideal para auditoría fiscal técnica avanzada)</option>
                                                    <option value="gemini-1.5-flash">gemini-1.5-flash (Rápido y económico)</option>
                                                </select>
                                            )}
                                            {apiProvider === 'anthropic' && (
                                                <select value={apiModel} onChange={(e) => setApiModel(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 outline-none font-semibold">
                                                    <option value="claude-3-5-sonnet-latest">claude-3-5-sonnet-latest (Auditoría de alta precisión)</option>
                                                    <option value="claude-3-5-haiku-latest">claude-3-5-haiku-latest (Económico y veloz)</option>
                                                </select>
                                            )}
                                            {apiProvider === 'openrouter' && (
                                                <input type="text" className="w-full bg-slate-50 border border-slate-300 rounded-lg py-2 px-3 font-mono outline-none" placeholder="google/gemini-2.5-flash" value={apiModel} onChange={(e) => setApiModel(e.target.value)} required />
                                            )}
                                        </div>

                                        <div className="flex gap-2 pt-4 border-t border-slate-100 flex-wrap">
                                            <button type="submit" className="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2 px-5 rounded-lg">Guardar Configuración</button>
                                            <button type="button" onClick={handleTestConnection} disabled={testingConnection} className="border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-2 px-5 rounded-lg">
                                                {testingConnection ? 'Probando...' : 'Probar Conexión'}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 py-6 mt-12 text-center text-xs text-slate-500 font-sans shrink-0">
                        <div className="max-w-7xl mx-auto px-4">
                            <p>© 2026 ConciliaMax México Contable. Desarrollado para importaciones a CONTPAQi i Contabilidad y Alegra ERP.</p>
                            <p className="mt-1 text-slate-400">Los archivos de pólizas generados son compatibles con la estructura XML del SAT (Versión CFDI 4.0).</p>
                        </div>
                    </footer>

                    {/* MODAL: XML VISUALIZER */}
                    {selectedCfdi && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in font-sans">
                            <div className="bg-white rounded-xl shadow-2xl border border-slate-200 max-w-2xl w-full overflow-hidden">
                                <div className="bg-slate-950 text-white p-4 flex justify-between items-center">
                                    <div className="flex items-center gap-2">
                                        <i data-lucide="file-code" className="text-emerald-400 w-5 h-5"></i>
                                        <h3 className="font-bold text-sm font-mono">Visor XML CFDI 4.0 (SAT México)</h3>
                                    </div>
                                    <button onClick={() => setSelectedCfdi(null)} className="text-slate-400 hover:text-white transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <div className="p-6 space-y-4 max-h-[450px] overflow-y-auto">
                                    <div className="bg-slate-50 p-4 rounded-lg font-mono text-[10px] text-slate-700 border border-slate-200 leading-normal">
                                        <span className="text-blue-600">&lt;cfdi:Comprobante</span> Version="4.0" Fecha="{selectedCfdi.fecha}" MetodoPago="{selectedCfdi.metodoPago}" FormaPago="{selectedCfdi.formaPago}" TipoDeComprobante="{selectedCfdi.tipo === 'Emitido' ? 'I' : 'G'}" SubTotal="{selectedCfdi.subtotal.toFixed(2)}" Total="{selectedCfdi.total.toFixed(2)}" Moneda="MXN" UUID="{selectedCfdi.uuid}"<span className="text-blue-600">&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Emisor</span> Rfc="{selectedCfdi.rfcEmisor}" Nombre="{selectedCfdi.nombreEmisor}" RegimenFiscal="601"<span className="text-blue-600">/&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Receptor</span> Rfc="{selectedCfdi.rfcReceptor}" Nombre="{selectedCfdi.nombreReceptor}" UsoCFDI="G03" RegimenFiscalReceptor="601"<span className="text-blue-600">/&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Conceptos&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Concepto</span> ClaveProdServ="43231500" Cantidad="1.0" ClaveUnidad="E48" Descripcion="{selectedCfdi.concepto}" ValorUnitario="{selectedCfdi.subtotal.toFixed(2)}" Importe="{selectedCfdi.subtotal.toFixed(2)}"<span className="text-blue-600">&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Impuestos&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Traslados&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;cfdi:Traslado</span> Base="{selectedCfdi.subtotal.toFixed(2)}" Impuesto="002" TipoFactor="Tasa" TasaOCuota="0.160000" Importe="{selectedCfdi.iva.toFixed(2)}"<span className="text-blue-600">/&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;/cfdi:Traslados&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;/cfdi:Impuestos&gt;</span><br />
                                        &nbsp;&nbsp;&nbsp;&nbsp;<span className="text-blue-600">&lt;/cfdi:Concepto&gt;</span><br />
                                        &nbsp;&nbsp;<span className="text-blue-600">&lt;/cfdi:Conceptos&gt;</span><br />
                                        <span className="text-blue-600">&lt;/cfdi:Comprobante&gt;</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-xs font-sans">
                                        <div>
                                            <span className="text-slate-500 font-bold font-semibold">Folio Fiscal (UUID):</span>
                                            <div className="font-mono text-[10px] break-all bg-slate-100 p-2 rounded mt-1 font-semibold text-indigo-700">{selectedCfdi.uuid}</div>
                                        </div>
                                        <div>
                                            <span className="text-slate-500 font-bold font-semibold">Sello Digital SAT (Firma):</span>
                                            <div className="font-mono text-[10px] break-all bg-slate-100 p-2 rounded mt-1">U3BzcmN2Yk1veGlaUzEyM0RldmVs...</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-end">
                                    <button onClick={() => setSelectedCfdi(null)} className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-1.5 px-4 rounded text-xs transition-all font-sans">
                                        Cerrar Vista
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            if (window.lucide) lucide.createIcons();
        }, 1000);
    </script>
</body>
</html>
